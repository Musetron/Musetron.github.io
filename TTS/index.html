<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Text → Audio Export Fix</title>

<style>
body {
    font-family: Arial;
    background: #fff;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 420px;
}

input, button {
    padding: 12px;
    font-size: 16px;
    border: 1px solid #000;
    background: #fff;
}

button:hover { background: #eee; }

small { color: #666; }
</style>
</head>

<body>

<div class="box">
    <input id="text" placeholder="Text eingeben...">
    <button onclick="generate()">MP3/WAV erstellen</button>
    <small id="status"></small>
</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const cache = {};

// einfache Lautsprache
function toPhonetic(t) {
    return t.toUpperCase()
        .replaceAll("EINE", "AINE")
        .replaceAll("EIN", "AIN")
        .replaceAll("IE", "I")
        .replaceAll("EI", "AI")
        .replaceAll("SCH", "SCH")
        .replaceAll("Ä", "AE")
        .replaceAll("Ö", "OE")
        .replaceAll("Ü", "UE");
}

// load wav
async function load(name) {
    if (cache[name]) return cache[name];
    try {
        const r = await fetch(name + ".wav");
        const b = await r.arrayBuffer();
        const a = await ctx.decodeAudioData(b);
        cache[name] = a;
        return a;
    } catch {
        return null;
    }
}

// 🧠 SAFE MIX ENGINE (kein Schneiden mehr)
function mix(buffers, sampleRate) {

    const length = sampleRate * 10; // 10 Sekunden max
    const output = ctx.createBuffer(1, length, sampleRate);
    const data = output.getChannelData(0);

    let time = 0;

    for (const buf of buffers) {

        const src = buf.buffer;
        const arr = src.getChannelData(0);

        for (let i = 0; i < arr.length; i++) {
            const idx = Math.floor(time * sampleRate) + i;

            if (idx < data.length) {
                data[idx] += arr[i] * 0.8; // mix gain
            }
        }

        time += buf.duration;
    }

    return output;
}

// WAV export
function exportWAV(buffer) {
    const wav = bufferToWav(buffer);
    const url = URL.createObjectURL(wav);

    const a = document.createElement("a");
    a.href = url;
    a.download = "speech.wav";
    a.click();
}

// WAV encoder
function bufferToWav(buffer) {
    const length = buffer.length * 2 + 44;
    const view = new DataView(new ArrayBuffer(length));

    let pos = 0;

    function w(s) {
        for (let i = 0; i < s.length; i++) view.setUint8(pos++, s.charCodeAt(i));
    }

    w("RIFF");
    view.setUint32(pos, 36 + buffer.length * 2, true); pos += 4;
    w("WAVEfmt ");
    view.setUint32(pos, 16, true); pos += 4;
    view.setUint16(pos, 1, true); pos += 2;
    view.setUint16(pos, 1, true); pos += 2;
    view.setUint32(pos, buffer.sampleRate, true); pos += 4;
    view.setUint32(pos, buffer.sampleRate * 2, true); pos += 4;
    view.setUint16(pos, 2, true); pos += 2;
    view.setUint16(pos, 16, true); pos += 2;

    w("data");
    view.setUint32(pos, buffer.length * 2, true); pos += 4;

    const data = buffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
        let s = Math.max(-1, Math.min(1, data[i]));
        s = s < 0 ? s * 0x8000 : s * 0x7FFF;
        view.setInt16(pos, s, true);
        pos += 2;
    }

    return new Blob([view], { type: "audio/wav" });
}

async function generate() {

    const status = document.getElementById("status");
    const text = document.getElementById("text").value;

    status.innerText = "loading...";

    const phon = toPhonetic(text);
    const chars = phon.toUpperCase().split("");

    const list = [];

    for (const c of chars) {

        const buf = await load(c);
        if (!buf) continue;

        list.push({
            buffer: buf,
            duration: 0.1
        });
    }

    status.innerText = "mixing...";

    const mixed = mix(list, ctx.sampleRate);

    status.innerText = "exporting...";

    exportWAV(mixed);

    status.innerText = "done ✔";
}
</script>

</body>
</html>
