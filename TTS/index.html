<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Flüssige Buchstaben-Sprache</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
}

input {
    width: 420px;
    padding: 10px;
    font-size: 18px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Text → flüssige Audio-Sprache</h2>

<input id="textInput" placeholder="TEXT EINGEBEN...">
<button onclick="playText()">PLAY</button>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const cache = {};

// Laden
async function loadSound(name) {
    if (cache[name]) return cache[name];

    try {
        const res = await fetch(name + ".wav");
        const buf = await res.arrayBuffer();
        const audio = await audioCtx.decodeAudioData(buf);
        cache[name] = audio;
        return audio;
    } catch (e) {
        console.warn("Fehlt:", name);
        return null;
    }
}

// Play mit Crossfade
function play(buffer, startTime, duration = 0.12) {
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();

    src.buffer = buffer;
    src.connect(gain);
    gain.connect(audioCtx.destination);

    // 🔥 sehr kurzer Crossfade (smooth Spracheffekt)
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(1, startTime + 0.02);
    gain.gain.setValueAtTime(1, startTime + duration);
    gain.gain.linearRampToValueAtTime(0, startTime + duration + 0.03);

    src.start(startTime);
}

// Tokenizer inkl. SCH
function tokenize(text) {
    text = text.toUpperCase();

    const tokens = [];
    let i = 0;

    while (i < text.length) {

        if (text.slice(i, i + 3) === "SCH") {
            tokens.push("SCH");
            i += 3;
            continue;
        }

        const c = text[i];

        if ("ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ, ".includes(c)) {
            tokens.push(c);
        }

        i++;
    }

    return tokens;
}

async function playText() {
    await audioCtx.resume();

    const text = document.getElementById("textInput").value;
    const tokens = tokenize(text);

    let t = audioCtx.currentTime;

    for (let token of tokens) {

        // 🟡 echte Pause nur bei Komma
        if (token === ",") {
            t += 0.35;
            continue;
        }

        if (token === " ") {
            continue; // KEINE Pause mehr bei Leerzeichen
        }

        const buffer = await loadSound(token);

        if (buffer) {
            play(buffer, t);
            t += 0.10; // 🔥 leicht überlappend = flüssige Sprache
        }
    }
}
</script>

</body>
</html>
