<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lautsprache Generator</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
}

input {
    width: 420px;
    padding: 10px;
    font-size: 18px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
}

#output {
    margin-top: 20px;
    font-size: 20px;
    color: #6cf;
}
</style>
</head>

<body>

<h2>Text → Lautsprache → Audio</h2>

<input id="textInput" placeholder="TEXT EINGEBEN...">
<button onclick="start()">START</button>

<div id="output"></div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const cache = {};

// einfache Lautsprache-Regeln (DE → vereinfachte Aussprache)
function toPhonetic(text) {
    text = text.toUpperCase();

    return text
        .replaceAll("EINE", "AINE")
        .replaceAll("EIN", "AIN")
        .replaceAll("IE", "I")
        .replaceAll("EI", "AI")
        .replaceAll("EU", "OI")
        .replaceAll("Ä", "AE")
        .replaceAll("Ö", "OE")
        .replaceAll("Ü", "UE")
        .replaceAll("SCH", "SCH") // bleibt gleich
        .replaceAll(" ", " ");
}

// Laden
async function loadSound(name) {
    if (cache[name]) return cache[name];

    try {
        const res = await fetch(name + ".wav");
        const buf = await res.arrayBuffer();
        const audio = await audioCtx.decodeAudioData(buf);
        cache[name] = audio;
        return audio;
    } catch (e) {
        console.warn("Fehlt:", name);
        return null;
    }
}

// Play
function play(buffer, t) {
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();

    src.buffer = buffer;
    src.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(1, t + 0.02);
    gain.gain.setValueAtTime(1, t + 0.12);
    gain.gain.linearRampToValueAtTime(0, t + 0.16);

    src.start(t);
}

// Tokenizer
function tokenize(text) {
    const tokens = [];
    let i = 0;

    text = text.toUpperCase();

    while (i < text.length) {

        if (text.slice(i, i + 3) === "SCH") {
            tokens.push("SCH");
            i += 3;
            continue;
        }

        const c = text[i];

        if ("ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ".includes(c)) {
            tokens.push(c);
        }

        i++;
    }

    return tokens;
}

async function start() {
    await audioCtx.resume();

    const input = document.getElementById("textInput").value;

    // 1️⃣ Lautsprache erzeugen
    const phonetic = toPhonetic(input);

    document.getElementById("output").innerText =
        "Lautsprache: " + phonetic;

    // 2️⃣ Audio aus Lautsprache
    const tokens = tokenize(phonetic);

    let t = audioCtx.currentTime;

    for (let token of tokens) {

        const buffer = await loadSound(token);

        if (buffer) {
            play(buffer, t);
            t += 0.11;
        }
    }
}
</script>

</body>
</html>
