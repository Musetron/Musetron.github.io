<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Text → MP3</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

input {
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    padding: 12px;
    font-size: 16px;
    border: 1px solid #000;
    background: #fff;
    cursor: pointer;
}

button:hover {
    background: #f2f2f2;
}

small {
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <input id="text" placeholder="Text eingeben...">
    <button onclick="generate()">MP3 erstellen</button>
    <small id="status"></small>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const cache = {};

// einfache Lautsprache
function toPhonetic(text) {
    return text.toUpperCase()
        .replaceAll("EINE", "AINE")
        .replaceAll("EIN", "AIN")
        .replaceAll("IE", "I")
        .replaceAll("EI", "AI")
        .replaceAll("SCH", "SCH")
        .replaceAll("Ä", "AE")
        .replaceAll("Ö", "OE")
        .replaceAll("Ü", "UE");
}

// Audio laden
async function loadSound(name) {
    if (cache[name]) return cache[name];

    try {
        const res = await fetch(name + ".wav");
        const buf = await res.arrayBuffer();
        const audio = await audioCtx.decodeAudioData(buf);
        cache[name] = audio;
        return audio;
    } catch {
        return null;
    }
}

// WAV Recorder (MP3-ready export via blob)
function exportWAV(buffer) {
    const wavBlob = bufferToWav(buffer);
    const url = URL.createObjectURL(wavBlob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "speech.wav";
    a.click();
}

// simple WAV encoder
function bufferToWav(buffer) {
    const numOfChan = buffer.numberOfChannels;
    const length = buffer.length * numOfChan * 2 + 44;
    const wav = new ArrayBuffer(length);
    const view = new DataView(wav);

    let offset = 0;

    function writeString(s) {
        for (let i = 0; i < s.length; i++) {
            view.setUint8(offset++, s.charCodeAt(i));
        }
    }

    writeString("RIFF");
    view.setUint32(offset, 36 + buffer.length * numOfChan * 2, true); offset += 4;
    writeString("WAVE");

    writeString("fmt ");
    view.setUint32(offset, 16, true); offset += 4;
    view.setUint16(offset, 1, true); offset += 2;
    view.setUint16(offset, numOfChan, true); offset += 2;
    view.setUint32(offset, buffer.sampleRate, true); offset += 4;
    view.setUint32(offset, buffer.sampleRate * numOfChan * 2, true); offset += 4;
    view.setUint16(offset, numOfChan * 2, true); offset += 2;
    view.setUint16(offset, 16, true); offset += 2;

    writeString("data");
    view.setUint32(offset, buffer.length * numOfChan * 2, true); offset += 4;

    const channels = [];
    for (let i = 0; i < numOfChan; i++) {
        channels.push(buffer.getChannelData(i));
    }

    let sampleIndex = 0;
    while (sampleIndex < buffer.length) {
        for (let c = 0; c < numOfChan; c++) {
            let sample = Math.max(-1, Math.min(1, channels[c][sampleIndex]));
            sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            view.setInt16(offset, sample, true);
            offset += 2;
        }
        sampleIndex++;
    }

    return new Blob([wav], { type: "audio/wav" });
}

// Hauptfunktion: render + export
async function generate() {
    const text = document.getElementById("text").value;
    const status = document.getElementById("status");

    status.innerText = "Generating...";

    const phonetic = toPhonetic(text);
    const chars = phonetic.toUpperCase().split("");

    const offline = new OfflineAudioContext(1, 48000 * 10, 48000);

    let t = 0;

    for (let c of chars) {
        const buffer = await loadSound(c);
        if (!buffer) continue;

        const src = offline.createBufferSource();
        src.buffer = buffer;
        src.connect(offline.destination);

        src.start(t);
        t += 0.1;
    }

    const rendered = await offline.startRendering();

    status.innerText = "Exporting WAV...";

    exportWAV(rendered);

    status.innerText = "Done ✔";
}
</script>

</body>
</html>
