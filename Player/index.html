<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Orange Player</title> 
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}
h2 {
  margin-bottom: 20px;
  font-weight: 500;
}
#player-container {
  display: flex;
  width: 95%;
  max-width: 1200px;
  gap: 30px;
}
#audio-effects, #video-effects {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
#video-container {
  width: 100%;
  position: relative;
  margin-bottom: 20px;
  overflow: hidden;
}
video {
  width: 100%;
  border-radius: 12px;
  background: black;
  filter: brightness(1) saturate(1) blur(0px) contrast(1);
  transform-origin: center center;
  transition: transform 0.1s linear;
  touch-action: none;
}
#video-controls {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}
#video-controls button {
  background: #ff3b3f;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.3s;
}
#video-controls button:hover { background: #ff6b6f; }

#timeline {
  margin-top: 12px;
  width: 100%;
  height: 120px;
  border-radius: 8px;
  border: 1px solid #333;
  cursor: pointer;
  background: #1a1a1a;
}
label {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  margin-bottom: 4px;
}
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 8px;
  border-radius: 5px;
  background: #333;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #ff3b3f;
  cursor: pointer;
  transition: background 0.3s;
}
input[type="range"]::-webkit-slider-thumb:hover { background: #ff6b6f; }
input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #ff3b3f; cursor: pointer;}
.value-display { font-weight: 500; }
.section-title { font-weight: 500; margin-bottom: 6px; font-size: 1.1rem; color:#ff6b6f;}
small { color: #aaa; }
</style>
</head>
<body>

<h2>Orange Player</h2> 
<input type="file" id="fileInput" accept="video/*">

<div id="video-container">
  <video id="video"></video>

  <div id="video-controls">
    <button id="playBtn">Play</button>
    <button id="pauseBtn">Pause</button>
    <button id="dolbyBtn">DOLBY OFF</button>
  </div>

  <canvas id="timeline"></canvas>
</div>

<div id="player-container">
  <!-- Audio-Effekte links -->
  <div id="audio-effects">
    <div class="section-title">Audio-Effekte</div>

    <div>
      <label>Hall: <span id="reverbValue" class="value-display">0.0</span></label>
      <input type="range" id="reverbSlider" min="0" max="1" step="0.01" value="0">
    </div>

    <div>
      <label>Geschwindigkeit: <span id="speedValue" class="value-display">1.0x</span></label>
      <input type="range" id="speedSlider" min="0.5" max="2" step="0.01" value="1">
    </div>

    <div>
      <label>Lautstärke: <span id="gainValue" class="value-display">1.0</span></label>
      <input type="range" id="gainSlider" min="0" max="3" step="0.01" value="1">
    </div>
  </div>

  <!-- Video-Effekte rechts -->
  <div id="video-effects">
    <div class="section-title">Video-Effekte</div>

    <div>
      <label>Helligkeit: <span id="brightnessValue" class="value-display">1.0</span></label>
      <input type="range" id="brightnessSlider" min="0" max="2" step="0.01" value="1">
    </div>

    <div>
      <label>Sättigung: <span id="saturationValue" class="value-display">1.0</span></label>
      <input type="range" id="saturationSlider" min="0" max="3" step="0.01" value="1">
    </div>

    <div>
      <label>Schärfe: <span id="blurValue" class="value-display">0px</span></label>
      <input type="range" id="blurSlider" min="-10" max="10" step="0.1" value="0">
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const fileInput = document.getElementById('fileInput');
const timeline = document.getElementById('timeline');
const ctx = timeline.getContext('2d');

const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const dolbyBtn = document.getElementById('dolbyBtn');

// Audio Nodes
let audioCtx, sourceNode, dryGain, wetGain, convolverNode, pannerNode;

// Slider & Werte
const reverbSlider = document.getElementById('reverbSlider');
const speedSlider = document.getElementById('speedSlider');
const gainSlider = document.getElementById('gainSlider');
const brightnessSlider = document.getElementById('brightnessSlider');
const saturationSlider = document.getElementById('saturationSlider');
const blurSlider = document.getElementById('blurSlider');

const reverbValue = document.getElementById('reverbValue');
const speedValue = document.getElementById('speedValue');
const gainValue = document.getElementById('gainValue');
const brightnessValue = document.getElementById('brightnessValue');
const saturationValue = document.getElementById('saturationValue');
const blurValue = document.getElementById('blurValue');

let leftData=[], rightData=[];
let videoLoaded=false, isScrubbing=false, dolbyOn=false;

// Datei laden
fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  video.src = url;

  const arrayBuffer = await file.arrayBuffer();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  try {
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    generateStereoWaveform(audioBuffer);

    if(sourceNode) sourceNode.disconnect();
    sourceNode = audioCtx.createMediaElementSource(video);

    dryGain = audioCtx.createGain();
    wetGain = audioCtx.createGain();
    convolverNode = audioCtx.createConvolver();

    const irBuffer = audioCtx.createBuffer(2, audioCtx.sampleRate*2, audioCtx.sampleRate);
    for(let c=0;c<irBuffer.numberOfChannels;c++){
      const data = irBuffer.getChannelData(c);
      for(let i=0;i<data.length;i++){ data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2); }
    }
    convolverNode.buffer = irBuffer;

    sourceNode.connect(dryGain);
    sourceNode.connect(convolverNode);
    convolverNode.connect(wetGain);
    dryGain.connect(audioCtx.destination);
    wetGain.connect(audioCtx.destination);

    dryGain.gain.value = 1 - parseFloat(reverbSlider.value);
    wetGain.gain.value = parseFloat(reverbSlider.value);

  } catch(e){console.warn("Audio konnte nicht decodiert werden.", e);}
});

// Timeline
video.addEventListener('loadedmetadata', () => {
  timeline.width = timeline.clientWidth;
  timeline.height = timeline.clientHeight;
  videoLoaded = true;
  drawTimeline();
});

// Stereo-Wellenform
function generateStereoWaveform(buffer){
  const rawL = buffer.getChannelData(0);
  const rawR = buffer.numberOfChannels>1?buffer.getChannelData(1):rawL;
  const samples=500;
  const blockSize=Math.floor(rawL.length/samples);
  let maxAmp=0;
  leftData=[]; rightData=[];
  for(let i=0;i<samples;i++){
    let sumL=0, sumR=0;
    for(let j=0;j<blockSize;j++){ sumL+=Math.abs(rawL[i*blockSize+j]||0); sumR+=Math.abs(rawR[i*blockSize+j]||0);}
    const avgL=sumL/blockSize, avgR=sumR/blockSize;
    leftData.push(avgL); rightData.push(avgR);
    maxAmp=Math.max(maxAmp,avgL,avgR);
  }
  leftData = leftData.map(v=>v/maxAmp);
  rightData = rightData.map(v=>v/maxAmp);
  drawTimeline();
}

// Timeline
function drawTimeline(){
  if(!videoLoaded) return;
  const w=timeline.width/leftData.length, h=timeline.height/2;
  ctx.clearRect(0,0,timeline.width,timeline.height);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,timeline.width,timeline.height);
  ctx.fillStyle='#fff';
  leftData.forEach((amp,i)=>{const y=amp*h; ctx.fillRect(i*w,h-y,w,y);});
  rightData.forEach((amp,i)=>{const y=amp*h; ctx.fillRect(i*w,h,w,y);});
  if(video.duration>0){
    const px=(video.currentTime/video.duration)*timeline.width;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,timeline.height); ctx.strokeStyle='red'; ctx.lineWidth=2; ctx.stroke();
  }
}

// Scrubbing
function scrub(e){const r=timeline.getBoundingClientRect(); let x=e.clientX-r.left; x=Math.max(0,Math.min(x,timeline.width)); video.currentTime=(x/timeline.width)*video.duration; drawTimeline();}
timeline.addEventListener('mousedown',e=>{if(videoLoaded){isScrubbing=true;scrub(e);}});
timeline.addEventListener('mousemove',e=>{if(videoLoaded && isScrubbing) scrub(e);});
window.addEventListener('mouseup',()=>{isScrubbing=false;});
video.addEventListener('timeupdate',()=>{if(!isScrubbing) drawTimeline();});

// Slider Events
reverbSlider.addEventListener('input',()=>{ const v=parseFloat(reverbSlider.value); reverbValue.textContent=v.toFixed(2); if(dryGain&&wetGain){ dryGain.gain.value=(1-v)*parseFloat(gainSlider.value); wetGain.gain.value=v*parseFloat(gainSlider.value); }});
speedSlider.addEventListener('input',()=>{ const v=parseFloat(speedSlider.value); speedValue.textContent=v.toFixed(2)+'x'; if(video) video.playbackRate=v;});
gainSlider.addEventListener('input',()=>{ const v=parseFloat(gainSlider.value); gainValue.textContent=v.toFixed(2); if(dryGain&&wetGain){ dryGain.gain.value=(1-parseFloat(reverbSlider.value))*v; wetGain.gain.value=parseFloat(reverbSlider.value)*v; }});

brightnessSlider.addEventListener('input',()=>{ const v=parseFloat(brightnessSlider.value); brightnessValue.textContent=v.toFixed(2); updateVideoFilter(); });
saturationSlider.addEventListener('input',()=>{ const v=parseFloat(saturationSlider.value); saturationValue.textContent=v.toFixed(2); updateVideoFilter(); });
blurSlider.addEventListener('input',()=>{ const v=parseFloat(blurSlider.value); blurValue.textContent=v.toFixed(1)+'px'; updateVideoFilter(); });

// Video Filter
function updateVideoFilter(){
  const b = parseFloat(brightnessSlider.value);
  const s = parseFloat(saturationSlider.value);
  const blurVal = parseFloat(blurSlider.value);
  
  let blurPx = 0;
  let contrastVal = 1;

  if(blurVal < 0){ 
    blurPx = Math.abs(blurVal);
    contrastVal = 1;
  } else if(blurVal > 0){ 
    blurPx = 0;
    contrastVal = 1 + blurVal/10;
  }

  video.style.filter = `brightness(${b}) saturate(${s}) blur(${blurPx}px) contrast(${contrastVal})`;
}

// Touch-Zoom
let initialDistance = 0, currentScale = 1;
video.addEventListener('touchmove', e => {
  if(e.touches.length === 2){
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const distance = Math.sqrt(dx*dx + dy*dy);
    if(initialDistance === 0) initialDistance = distance;
    const scale = (distance / initialDistance) * currentScale;
    video.style.transform = `scale(${scale})`;
  }
});
video.addEventListener('touchend', e => {
  if(e.touches.length < 2){ 
    const transform = video.style.transform.match(/scale\(([^)]+)\)/);
    currentScale = transform ? parseFloat(transform[1]) : 1;
    initialDistance = 0;
  }
});

// Play/Pause
playBtn.addEventListener('click', ()=>{ video.play(); });
pauseBtn.addEventListener('click', ()=>{ video.pause(); });

// DOLBY Button
dolbyBtn.addEventListener('click', () => {
  if (!audioCtx || !sourceNode) return;

  if (!dolbyOn) {
    pannerNode = audioCtx.createPanner();
    pannerNode.panningModel = 'HRTF';
    pannerNode.distanceModel = 'inverse';
    pannerNode.setPosition(0, 0, -1);
    sourceNode.disconnect();
    sourceNode.connect(pannerNode);
    pannerNode.connect(dryGain);
    pannerNode.connect(convolverNode);
    dolbyBtn.textContent = 'DOLBY ON';
  } else {
    sourceNode.disconnect();
    sourceNode.connect(dryGain);
    sourceNode.connect(convolverNode);
    dolbyBtn.textContent = 'DOLBY OFF';
  }

  dolbyOn = !dolbyOn;
});
</script>
</body>
</html>
