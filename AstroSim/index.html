<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sci-Fi Sonnensystem</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
  z-index: 10;
}
</style>
</head>

<body>

<div id="info">Klicke auf einen Planeten</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  2000
);

camera.position.set(0, 20, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Licht
const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambientLight);

// 🌞 Sonne (reduziert & warm)
const sunLight = new THREE.PointLight(0xffaa55, 2.5, 900);
scene.add(sunLight);

// Sterne
const starsGeometry = new THREE.BufferGeometry();
const starsVertices = [];

for (let i = 0; i < 20000; i++) {
  starsVertices.push(
    (Math.random() - 0.5) * 2000,
    (Math.random() - 0.5) * 2000,
    (Math.random() - 0.5) * 2000
  );
}

starsGeometry.setAttribute(
  'position',
  new THREE.Float32BufferAttribute(starsVertices, 3)
);

const starsMaterial = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.7
});

const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// Planet Daten
const data = [
  { name:'Sonne', size:3, dist:0, orbit:0, spin:0.002 },
  { name:'Hell', size:0.4, dist:6, orbit:0.03, spin:0.01 },
  { name:'AlienParadiese', size:1, dist:10, orbit:0.01, spin:0.008 },
  { name:'SpyEye', size:0.6, dist:15, orbit:0.008, spin:0.004 },
  { name:'Thalor', size:0.8, dist:21, orbit:0.005, spin:0.005 },
  { name:'Nivar', size:2.2, dist:30, orbit:0.002, spin:0.02 },
  { name:'Pechno', size:1.1, dist:40, orbit:0.001, spin:0.003 }
];

const loader = new THREE.TextureLoader();
const planets = [];

for (let i = 0; i < data.length; i++) {

  const d = data[i];

  const orbitGroup = new THREE.Object3D();
  scene.add(orbitGroup);

  loader.load(`${i+1}.jpg`, function(texture) {

    texture.colorSpace = THREE.SRGBColorSpace;

    const geometry = new THREE.SphereGeometry(d.size, 64, 64);

    const material = new THREE.MeshStandardMaterial({
      map: texture,
      emissive: i === 0 ? new THREE.Color(0xffaa33) : new THREE.Color(0x000000),
      emissiveIntensity: i === 0 ? 0.6 : 0,
      metalness: 0,
      roughness: 1
    });

    const mesh = new THREE.Mesh(geometry, material);

    mesh.position.x = d.dist;
    orbitGroup.add(mesh);

    mesh.userData.name = d.name;

    planets.push({
      mesh,
      orbitGroup,
      spin: d.spin,
      orbit: d.orbit,
      name: d.name
    });

  });
}

// Klick Auswahl
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function clickPlanet(event) {

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(
    planets.map(p => p.mesh)
  );

  if (intersects.length > 0) {

    const target = intersects[0].object;

    const pos = new THREE.Vector3();
    target.getWorldPosition(pos);

    camera.position.set(
      pos.x + 4,
      pos.y + 2,
      pos.z + 4
    );

    controls.target.copy(pos);

    document.getElementById('info').innerHTML = target.userData.name;
  }
}

window.addEventListener('click', clickPlanet);
window.addEventListener('touchstart', (e) => {
  clickPlanet(e.touches[0]);
});

// Animation
function animate() {
  requestAnimationFrame(animate);

  planets.forEach(p => {
    p.mesh.rotation.y += p.spin;
    p.orbitGroup.rotation.y += p.orbit;
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
