<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarSim</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

#info{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:10px;
  z-index:10;
}

</style>
</head>

<body>

<div id="info">
Click on a Planet!
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// =========================
// Szene
// =========================

const scene =
  new THREE.Scene();

const camera =
  new THREE.PerspectiveCamera(
    75,
    window.innerWidth /
    window.innerHeight,
    0.1,
    4000
  );

camera.position.set(
  0,
  20,
  60
);

const renderer =
  new THREE.WebGLRenderer({
    antialias:true
  });

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

renderer.outputColorSpace =
  THREE.SRGBColorSpace;

document.body.appendChild(
  renderer.domElement
);

// =========================
// Background Music
// =========================

const listener =
  new THREE.AudioListener();

camera.add(listener);

const backgroundMusic =
  new THREE.Audio(listener);

const audioLoader =
  new THREE.AudioLoader();

audioLoader.load(
  'music.mp3',
  function(buffer){

    backgroundMusic.setBuffer(buffer);

    backgroundMusic.setLoop(true);

    backgroundMusic.setVolume(0.5);

    backgroundMusic.play();

  }
);

// =========================
// SKYBOX
// =========================

const loader =
  new THREE.TextureLoader();

loader.load(
  'space.jpg',
  function(tex){

    tex.colorSpace =
      THREE.SRGBColorSpace;

    const skyGeo =
      new THREE.SphereGeometry(
        1800,
        64,
        64
      );

    const skyMat =
      new THREE.MeshBasicMaterial({

        map:tex,
        side:THREE.BackSide

      });

    const sky =
      new THREE.Mesh(
        skyGeo,
        skyMat
      );

    scene.add(sky);

  }
);

// =========================
// Controls
// =========================

const controls =
  new THREE.OrbitControls(
    camera,
    renderer.domElement
  );

controls.enableDamping = true;
controls.dampingFactor = 0.05;

// =========================
// Camera Lock
// =========================

let lockedPlanet = null;

// =========================
// Licht
// =========================

const ambientLight =
  new THREE.AmbientLight(
    0xffffff,
    0.35
  );

scene.add(ambientLight);

const sunLight =
  new THREE.PointLight(
    0xffaa55,
    2.5,
    900
  );

scene.add(sunLight);

// =========================
// Sterne
// =========================

const starsGeometry =
  new THREE.BufferGeometry();

const starsVertices = [];

for(let i=0;i<25000;i++){

  starsVertices.push(
    (Math.random()-0.5)*2500,
    (Math.random()-0.5)*2500,
    (Math.random()-0.5)*2500
  );

}

starsGeometry.setAttribute(
  'position',

  new THREE.Float32BufferAttribute(
    starsVertices,
    3
  )
);

const starsMaterial =
  new THREE.PointsMaterial({

    color:0xffffff,
    size:0.7

  });

const stars =
  new THREE.Points(
    starsGeometry,
    starsMaterial
  );

scene.add(stars);

// =========================
// Planet Daten
// =========================

const data = [

  {
    name:'Vareth',
    size:3,
    dist:0,
    orbit:0,
    spin:0.0003
  },

  {
    name:'Kharos',
    size:0.4,
    dist:6,
    orbit:0.002,
    spin:0.001
  },

  {
    name:'Elyra',
    size:1,
    dist:10,
    orbit:0.0012,
    spin:0.0008
  },

  {
    name:'Aegis‑9',
    size:0.6,
    dist:15,
    orbit:0.0009,
    spin:0.0005
  },

  {
    name:'Morvane',
    size:0.8,
    dist:21,
    orbit:0.0006,
    spin:0.0004
  },

  {
    name:'Vorex',
    size:2.2,
    dist:30,
    orbit:0.0003,
    spin:0.0015
  },

  {
    name:'Cryos',
    size:1.1,
    dist:40,
    orbit:0.00015,
    spin:0.0003
  }

];

const planets = [];

// =========================
// Vareth
// =========================

const sunGroup =
  new THREE.Group();

scene.add(sunGroup);

loader.load(
  `1.jpg`,
  function(texture){

    texture.colorSpace =
      THREE.SRGBColorSpace;

    const sunGeo =
      new THREE.SphereGeometry(
        3,
        64,
        64
      );

    const sunMat =
      new THREE.MeshStandardMaterial({

        map:texture,

        emissive:
          new THREE.Color(
            0xffaa33
          ),

        emissiveIntensity:0.6

      });

    const sunMesh =
      new THREE.Mesh(
        sunGeo,
        sunMat
      );

    sunMesh.userData.name =
      'Vareth';

    sunGroup.add(sunMesh);

    planets.push({

      mesh:sunMesh,
      orbitGroup:sunGroup,
      spin:0.002,
      orbit:0,
      name:'Vareth'

    });

  }
);

// =========================
// Sonnen Overlays
// =========================

loader.load(
  `12.png`,
  function(tex){

    tex.colorSpace =
      THREE.SRGBColorSpace;

    const geo =
      new THREE.SphereGeometry(
        3.02,
        64,
        64
      );

    const mat =
      new THREE.MeshBasicMaterial({

        map:tex,
        transparent:true,
        blending:
          THREE.AdditiveBlending,
        side:THREE.DoubleSide,
        depthWrite:false

      });

    const sphere1 =
      new THREE.Mesh(
        geo,
        mat
      );

    sunGroup.add(sphere1);

    sunGroup.userData.overlay1 =
      sphere1;

  }
);

loader.load(
  `12.png`,
  function(tex){

    tex.colorSpace =
      THREE.SRGBColorSpace;

    const geo =
      new THREE.SphereGeometry(
        3.01,
        64,
        64
      );

    const mat =
      new THREE.MeshBasicMaterial({

        map:tex,
        transparent:true,
        blending:
          THREE.AdditiveBlending,
        side:THREE.DoubleSide,
        depthWrite:false,
        opacity:0.3

      });

    const sphere2 =
      new THREE.Mesh(
        geo,
        mat
      );

    sunGroup.add(sphere2);

    sunGroup.userData.overlay2 =
      sphere2;

  }
);

// =========================
// Sonnenstrahlen
// =========================

loader.load(
  `13.png`,
  function(rayTex){

    rayTex.colorSpace =
      THREE.SRGBColorSpace;

    const rayGeo =
      new THREE.PlaneGeometry(
        9.5,
        9.5
      );

    const rayMat =
      new THREE.MeshBasicMaterial({

        map:rayTex,
        transparent:true,
        blending:
          THREE.AdditiveBlending,
        side:THREE.DoubleSide,
        depthWrite:false

      });

    const rays1 =
      new THREE.Mesh(
        rayGeo,
        rayMat
      );

    const rays2 =
      new THREE.Mesh(
        rayGeo,
        rayMat.clone()
      );

    sunGroup.add(rays1);
    sunGroup.add(rays2);

    sunGroup.userData.rays1 =
      rays1;

    sunGroup.userData.rays2 =
      rays2;

  }
);

// =========================
// PLANETEN
// =========================

for(let i=1;i<data.length;i++){

  const d = data[i];

  const orbitGroup =
    new THREE.Object3D();

  scene.add(orbitGroup);

  loader.load(
    `${i+1}.jpg`,
    function(texture){

      texture.colorSpace =
        THREE.SRGBColorSpace;

      let cityTexture = null;

      // =====================
      // Nacht Overlay
      // =====================

      if(i === 2){

        cityTexture =
          loader.load(`33.png`);

        cityTexture.colorSpace =
          THREE.SRGBColorSpace;

      }

      const geometry =
        new THREE.SphereGeometry(
          d.size,
          64,
          64
        );

      const material =
        new THREE.MeshStandardMaterial({

          map:texture,
          metalness:0,
          roughness:1

        });

      // =====================
      // FIXED NIGHT SHADER
      // =====================

      if(i === 2){

        material.onBeforeCompile =
          (shader)=>{

          shader.uniforms.sunDirection = {
            value:new THREE.Vector3()
          };

          shader.uniforms.nightMap = {
            value:cityTexture
          };

          shader.vertexShader =
            shader.vertexShader.replace(

            '#include <common>',

            `
            #include <common>

            varying vec3 vWorldNormal;
            `
          );

          shader.vertexShader =
            shader.vertexShader.replace(

            '#include <beginnormal_vertex>',

            `
            #include <beginnormal_vertex>

            vWorldNormal =
              normalize(
                mat3(modelMatrix)
                * objectNormal
              );
            `
          );

          shader.fragmentShader =
            shader.fragmentShader.replace(

            '#include <common>',

            `
            #include <common>

            uniform sampler2D nightMap;
            uniform vec3 sunDirection;

            varying vec3 vWorldNormal;
            `
          );

          shader.fragmentShader =
            shader.fragmentShader.replace(

            '#include <dithering_fragment>',

            `

            float lightDot =
              dot(
                normalize(
                  vWorldNormal
                ),
                normalize(
                  sunDirection
                )
              );

            float nightFactor =
              smoothstep(
                0.1,
                -0.15,
                lightDot
              );

            vec4 nightColor =
              texture2D(
                nightMap,
                vUv
              );

            gl_FragColor.rgb +=
              nightColor.rgb *
              2.2 *
              nightFactor;

            #include <dithering_fragment>
            `
          );

          mesh.userData.shader =
            shader;

        };

      }

      // =====================
      // Rot Glow
      // =====================

      if(i === 1 || i === 3){

        material.onBeforeCompile =
          (shader)=>{

          shader.fragmentShader =
            shader.fragmentShader
            .replace(

            '#include <dithering_fragment>',

            `

            vec3 texColor =
              gl_FragColor.rgb;

            float redOnly =
              max(
                texColor.r -
                max(
                  texColor.g,
                  texColor.b
                ),
                0.0
              );

            texColor += vec3(
              redOnly * 1.2,
              redOnly * 0.15,
              redOnly * 0.15
            );

            gl_FragColor.rgb =
              texColor;

            #include <dithering_fragment>
            `
          );

        };

      }

      const mesh =
        new THREE.Mesh(
          geometry,
          material
        );

      // =====================
      // Shader Update
      // =====================

      if(i === 2){

        mesh.onBeforeRender =
          ()=>{

          if(mesh.userData.shader){

            const worldPos =
              new THREE.Vector3();

            mesh.getWorldPosition(
              worldPos
            );

            const sunPos =
              new THREE.Vector3(
                0,
                0,
                0
              );

            const dir =
              sunPos
              .sub(worldPos)
              .normalize();

            mesh.userData.shader
              .uniforms
              .sunDirection
              .value
              .copy(dir);

          }

        };

      }

      mesh.position.x =
        d.dist;

      orbitGroup.add(mesh);

      // =====================
      // Rays für Kharos
      // =====================

      if(i === 1){

        loader.load(
          `13.png`,
          function(rayTex){

            rayTex.colorSpace =
              THREE.SRGBColorSpace;

            const rayGeo =
              new THREE.PlaneGeometry(
                0.5,
                0.5
              );

            const rayMat =
              new THREE.MeshBasicMaterial({

                map:rayTex,
                transparent:true,
                blending:
                  THREE.AdditiveBlending,
                side:
                  THREE.DoubleSide,
                depthWrite:false

              });

            const rays =
              new THREE.Mesh(
                rayGeo,
                rayMat
              );

            mesh.add(rays);

            mesh.userData.rays =
              rays;

          }
        );

      }

      // =====================
      // Planet Rays
      // =====================

      if(i === 2){

        loader.load(
          `32.png`,
          function(rayTex){

            rayTex.colorSpace =
              THREE.SRGBColorSpace;

            const rayGeo =
              new THREE.PlaneGeometry(
                3.0,
                3.0
              );

            const rayMat =
              new THREE.MeshBasicMaterial({

                map:rayTex,
                transparent:true,
                blending:
                  THREE.AdditiveBlending,
                side:
                  THREE.DoubleSide,
                depthWrite:false,
                opacity:0.9

              });

            const rays1 =
              new THREE.Mesh(
                rayGeo,
                rayMat
              );

            const rays2 =
              new THREE.Mesh(
                rayGeo,
                rayMat.clone()
              );

            mesh.add(rays1);
            mesh.add(rays2);

            mesh.userData.rays1 =
              rays1;

            mesh.userData.rays2 =
              rays2;

          }
        );

      }

      mesh.userData.name =
        d.name;

      planets.push({

        mesh,
        orbitGroup,
        spin:d.spin,
        orbit:d.orbit,
        name:d.name

      });

    }
  );

}

// =========================
// Klick Auswahl
// =========================

const raycaster =
  new THREE.Raycaster();

const mouse =
  new THREE.Vector2();

function clickPlanet(event){

  mouse.x =
    (event.clientX /
    window.innerWidth) * 2 - 1;

  mouse.y =
    -(event.clientY /
    window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(
    mouse,
    camera
  );

  const intersects =
    raycaster.intersectObjects(
      planets.map(p=>p.mesh)
    );

  if(intersects.length > 0){

    const target =
      intersects[0].object;

    lockedPlanet = target;

    const pos =
      new THREE.Vector3();

    target.getWorldPosition(pos);

    camera.position.set(
      pos.x + 4,
      pos.y + 2,
      pos.z + 4
    );

    controls.target.copy(pos);

    document.getElementById(
      'info'
    ).innerHTML =
      target.userData.name;

  }

}

window.addEventListener(
  'click',
  clickPlanet
);

window.addEventListener(
  'touchstart',
  (e)=>{
    clickPlanet(
      e.touches[0]
    );
  }
);

// =========================
// Animation
// =========================

function animate(){

  requestAnimationFrame(
    animate
  );

  planets.forEach(p=>{

    p.mesh.rotation.y +=
      p.spin;

    p.orbitGroup.rotation.y +=
      p.orbit;

    // Kleine Rays

    if(p.mesh.userData.rays){

      const r =
        p.mesh.userData.rays;

      r.lookAt(camera.position);

      r.rotation.z += 0.001;

    }

    // Planet Rays

    if(p.mesh.userData.rays1){

      const r1 =
        p.mesh.userData.rays1;

      const r2 =
        p.mesh.userData.rays2;

      r1.lookAt(camera.position);
      r2.lookAt(camera.position);

      r1.rotation.z += 0.01;
      r2.rotation.z -= 0.008;

    }

  });

  // =========================
  // Camera Lock Update
  // =========================

  if(lockedPlanet){

    const pos =
      new THREE.Vector3();

    lockedPlanet.getWorldPosition(pos);

    controls.target.copy(pos);

  }

  // Sonnen Overlays

  if(sunGroup.userData.overlay1){

    sunGroup.userData.overlay1
      .rotation.y += 0.001;

  }

  if(sunGroup.userData.overlay2){

    sunGroup.userData.overlay2
      .rotation.y -= 0.0008;

  }

  // Sonnenstrahlen

  if(sunGroup.userData.rays1){

    const r1 =
      sunGroup.userData.rays1;

    const r2 =
      sunGroup.userData.rays2;

    r1.lookAt(camera.position);
    r2.lookAt(camera.position);

    r1.rotation.z += 0.004;
    r2.rotation.z -= 0.004;

  }

  controls.update();

  renderer.render(
    scene,
    camera
  );

}

animate();

// =========================
// Resize
// =========================

window.addEventListener(
  'resize',
  ()=>{

    camera.aspect =
      window.innerWidth /
      window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

  }
);

</script>

</body>
</html>
