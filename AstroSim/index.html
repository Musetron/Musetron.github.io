<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galaxy + Vareth System</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at center, #05070f, #02030a);
}
canvas{
  display:block;
  touch-action:none;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>

////////////////////////////////////////////////////////////
// 🖥️ CANVAS
////////////////////////////////////////////////////////////

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

const cx = () => canvas.width / 2;
const cy = () => canvas.height / 2;

////////////////////////////////////////////////////////////
// 🧭 CAMERA
////////////////////////////////////////////////////////////

const camera = {
  x: 0,
  y: 0,
  zoom: 1
};

let isDragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e => {
  isDragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

addEventListener("mouseup", () => isDragging = false);

addEventListener("mousemove", e => {
  if(!isDragging) return;

  camera.x += e.clientX - lastX;
  camera.y += e.clientY - lastY;

  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();

  const zoomFactor = 1.1;

  const mouseX = e.clientX;
  const mouseY = e.clientY;

  const worldX = (mouseX - camera.x) / camera.zoom;
  const worldY = (mouseY - camera.y) / camera.zoom;

  const dir = e.deltaY > 0 ? 1 / zoomFactor : zoomFactor;
  camera.zoom *= dir;

  camera.zoom = Math.min(Math.max(camera.zoom, 0.1), 100);

  camera.x = mouseX - worldX * camera.zoom;
  camera.y = mouseY - worldY * camera.zoom;
}, { passive:false });



////////////////////////////////////////////////////////////
// 📱 TOUCH SUPPORT
////////////////////////////////////////////////////////////

let lastTouchDistance = 0;

function touchDistance(t1, t2){
  const dx = t2.clientX - t1.clientX;
  const dy = t2.clientY - t1.clientY;
  return Math.hypot(dx, dy);
}

function touchCenter(t1, t2){
  return {
    x: (t1.clientX + t2.clientX) / 2,
    y: (t1.clientY + t2.clientY) / 2
  };
}

canvas.addEventListener("touchstart", e => {

  // EIN Finger = bewegen
  if(e.touches.length === 1){

    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }

  // ZWEI Finger = pinch zoom
  if(e.touches.length === 2){

    isDragging = false;

    lastTouchDistance = touchDistance(
      e.touches[0],
      e.touches[1]
    );
  }

}, { passive:false });

canvas.addEventListener("touchmove", e => {

  e.preventDefault();

  // PAN
  if(e.touches.length === 1 && isDragging){

    const t = e.touches[0];

    camera.x += t.clientX - lastX;
    camera.y += t.clientY - lastY;

    lastX = t.clientX;
    lastY = t.clientY;
  }

  // PINCH ZOOM
  if(e.touches.length === 2){

    const t1 = e.touches[0];
    const t2 = e.touches[1];

    const newDistance = touchDistance(t1, t2);

    const center = touchCenter(t1, t2);

    const worldX = (center.x - camera.x) / camera.zoom;
    const worldY = (center.y - camera.y) / camera.zoom;

    const zoomFactor = newDistance / lastTouchDistance;

    camera.zoom *= zoomFactor;

    camera.zoom = Math.min(Math.max(camera.zoom, 0.1), 100);

    camera.x = center.x - worldX * camera.zoom;
    camera.y = center.y - worldY * camera.zoom;

    lastTouchDistance = newDistance;
  }

}, { passive:false });

canvas.addEventListener("touchend", () => {

  isDragging = false;

}, { passive:false });

////////////////////////////////////////////////////////////
// 🌟 STARS
////////////////////////////////////////////////////////////

const stars = [];
for(let i=0;i<9000;i++){
  stars.push({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*0.6,
    a: Math.random()*0.8+0.2
  });
}

////////////////////////////////////////////////////////////
// 🌌 GALAXY ASSETS
////////////////////////////////////////////////////////////

const cloud = new Image();
cloud.src = "cloud.png";

const hole = new Image();
hole.src = "hole.png";

////////////////////////////////////////////////////////////
// 🧬 HASH
////////////////////////////////////////////////////////////

function hash(n){
  return fract(Math.sin(n) * 43758.5453123);
}
function fract(x){
  return x - Math.floor(x);
}

////////////////////////////////////////////////////////////
// 🌌 GALAXY PARTICLES
////////////////////////////////////////////////////////////

const arms = 3;
const count = 3500;
const radiusMax = 420;

const particles = [];

for(let i=0;i<count;i++){
  const armOffset = (Math.PI * 2 / arms) * (i % arms);
  const t = Math.pow(Math.random(), 0.65);

  particles.push({
    armOffset,
    radius: t * radiusMax,
    size: 6 + Math.random()*60,
    alpha: 0.05 + Math.random()*0.35,
    spin: 0.1 * t,
    seed: Math.random() * 10000
  });
}

let rotation = 0;

////////////////////////////////////////////////////////////
// 🪐 SYSTEM DATA
////////////////////////////////////////////////////////////

const SYSTEM = {
  sun: { img: "vareth.png" },
  planets: [
    { name:"Khratos", diameterKm:2479, orbitKm: 58_000_000, img:"khratos.png" },
    { name:"Elyra", diameterKm:12700, orbitKm: 108_000_000, img:"elyra.png" },
    { name:"Aegis-9", diameterKm:160, orbitKm: 180_000_000, img:"aegis9.png" },
    { name:"Morvane", diameterKm:6779, orbitKm: 228_000_000, img:"morvane.png" },
    { name:"Vorex", diameterKm:142976, orbitKm: 305_000_000, img:"vorex.png" },
    { name:"Cryos", diameterKm:10104, orbitKm: 578_000_000, img:"cryos.png" }
  ]
};

const SCALE = {
  kmToPxOrbit: 8e-8,
  timeScale: 0.0002
};

const EARTH = 12742;

function planetSize(km){
  const ratio = km / EARTH;
  return Math.pow(ratio, 0.2) * 3;
}

function sunSize(){ return 60; }

function load(src){
  const img = new Image();
  img.src = src;
  return img;
}

const sunImg = load(SYSTEM.sun.img);

const planets = SYSTEM.planets.map((p,i)=>({
  ...p,
  img: load(p.img),
  angle: Math.random()*Math.PI*2,
  orbitPx: p.orbitKm * SCALE.kmToPxOrbit * (1 + i*0.4)
}));

const offsetX = () => canvas.width * 0.25; // links
const offsetY = () => canvas.height * 0.70; // unten

////////////////////////////////////////////////////////////
// 🎬 DRAW LOOP
////////////////////////////////////////////////////////////

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const time = performance.now() * 0.000005;

  ////////////////////////////////////////////////////////////
  // 🌟 STARS (screen space)
  ////////////////////////////////////////////////////////////

  ctx.globalCompositeOperation = "source-over";

  for(const s of stars){
    ctx.globalAlpha = s.a;
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;

  ////////////////////////////////////////////////////////////
  // 🌌 GALAXY
  ////////////////////////////////////////////////////////////

  ctx.save();
  ctx.translate(camera.x, camera.y);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(cx(), cy());
  ctx.rotate(rotation);

  ctx.globalCompositeOperation = "lighter";

  for(const p of particles){

    const n1 = hash(p.seed*1.3)-0.5;
    const n2 = hash(p.seed*2.1)-0.5;

    const angle =
      p.armOffset +
      p.spin +
      (p.radius * 0.012) +
      time +
      n1 * 0.8;

    const r = p.radius + n2 * 18;

    const x = Math.cos(angle)*r;
    const y = Math.sin(angle)*r;

    ctx.globalAlpha = p.alpha;

    ctx.drawImage(cloud, x-p.size/2, y-p.size/2, p.size, p.size);
  }

  ctx.restore();

  ////////////////////////////////////////////////////////////
  // 🕳️ BLACK HOLE
  ////////////////////////////////////////////////////////////

  ctx.save();
  ctx.translate(camera.x, camera.y);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(cx(), cy());

  ctx.globalAlpha = 1;
  ctx.drawImage(hole, -130, -130, 260, 260);
  ctx.restore();

  ////////////////////////////////////////////////////////////
  // 🪐 SOLAR SYSTEM
  ////////////////////////////////////////////////////////////

  ctx.save();
  ctx.translate(camera.x, camera.y);
  ctx.scale(camera.zoom, camera.zoom);

  const originX = offsetX();
  const originY = offsetY();

  const s = sunSize();

  ctx.drawImage(sunImg, originX-s/2, originY-s/2, s, s);

  planets.forEach((p,i)=>{

    p.angle += SCALE.timeScale/(i+1);

    const x = originX + Math.cos(p.angle)*p.orbitPx;
    const y = originY + Math.sin(p.angle)*p.orbitPx;

    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 0.1;
    ctx.beginPath();
    ctx.arc(originX, originY, p.orbitPx, 0, Math.PI*2);
    ctx.stroke();

    const size = Math.max(1, planetSize(p.diameterKm));

    ctx.drawImage(p.img, x-size/2, y-size/2, size, size);
  });

  ctx.restore();

  rotation += 0.0002;

  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
