<!DOCTYPE html>  <html lang="de">    <head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1">  <title>Donner Satellit</title>  <style>    
body{    
    font-family: Arial, sans-serif;    
    font-size: 14px;    
    margin: 20px;    
    background: #ffffff;    
    color: #222;    
}    h2{
margin: 0 0 15px 0;
font-size: 20px;
font-weight: 600;
}

.toolbar{
margin-bottom: 15px;
}

button{
width: 160px;
padding: 8px;
margin-right: 6px;
border: 1px solid #bfbfbf;
background: #f3f3f3;
cursor: pointer;
font-size: 13px;
}

button:hover{
background: #e9e9e9;
}

table{
width: 100%;
border-collapse: collapse;
margin-top: 10px;
}

th,
td{
border: 1px solid #cfcfcf;
padding: 6px 8px;
text-align: left;
}

th{
background: #efefef;
font-weight: 600;
}

.status-table{
width: 500px;
margin-bottom: 15px;
}

.status-table td:first-child{
width: 150px;
background: #f7f7f7;
font-weight: 600;
}
</style>  </head>  <body>  <h2>Donner Satellit</h2>  <div class="toolbar">
<button id="startBtn">Satellit Einschalten</button>
<button id="testBtn">Test Senden</button>

</div>  <table class="status-table">    
<tr>    
    <td>Protocol</td>    
    <td id="gstate">WAIT</td>    
</tr>    
<tr>    
    <td>Audio</td>    
    <td id="astate">WAIT</td>    
</tr>    
<tr>    
    <td>Events</td>    
    <td id="events">0</td>    
</tr>    
<tr>    
    <td>Last TX</td>    
    <td id="lasttx">---</td>    
</tr>    
<tr>    
    <td>Level</td>    
    <td id="level">0</td>    
</tr>    
</table>  <table>    
<thead>    
<tr>    
<th>Zeit</th>    
<th>Kilometer</th>    
<th>Pegel</th>    
</tr>    
</thead>    
<tbody id="log"></tbody>    
</table>  <script src="js/ggwave.js"></script>  <script>    window.AudioContext =
window.AudioContext ||
window.webkitAudioContext;

let ggwave = null;
let context = null;
let parameters = null;
let instance = null;

let analyser = null;
let micSource = null;

let thunderEvents = [];
let lastDetection = 0;

function convertTypedArray(src, type){

const buffer =    
    new ArrayBuffer(src.byteLength);    

new src.constructor(buffer).set(src);    

return new type(buffer);

}

async function initGGWave(){

if(instance) return;    

ggwave = await ggwave_factory();    

context = new AudioContext({    
    sampleRate:48000    
});    

parameters =    
    ggwave.getDefaultParameters();    

parameters.sampleRateInp =    
    context.sampleRate;    

parameters.sampleRateOut =    
    context.sampleRate;    

instance =    
    ggwave.init(parameters);    

document.getElementById("gstate")    
    .textContent = "READY";    

console.log("Protocol READY");

}

async function sendGGWave(text){

await initGGWave();    

if(context.state !== "running"){    
    await context.resume();    
}    

const waveform =    
ggwave.encode(    
    instance,    
    text,    
    ggwave.ProtocolId.GGWAVE_PROTOCOL_AUDIBLE_NORMAL,    
    10    
);    

const buf =    
    convertTypedArray(    
        waveform,    
        Float32Array    
    );    

const buffer =    
    context.createBuffer(    
        1,    
        buf.length,    
        context.sampleRate    
    );    

buffer.getChannelData(0).set(buf);    

const source =    
    context.createBufferSource();    

source.buffer = buffer;    
source.connect(context.destination);    

source.start();    

document.getElementById("lasttx")    
    .textContent =    
    new Date().toLocaleTimeString();    

console.log("TX:", text);

}

async function startMic(){

await initGGWave();    

if(context.state !== "running"){    
    await context.resume();    
}    

const stream =    
    await navigator.mediaDevices.getUserMedia({    
        audio:{    
            echoCancellation:false,    
            noiseSuppression:false,    
            autoGainControl:false    
        }    
    });    

micSource =    
    context.createMediaStreamSource(stream);    

analyser =    
    context.createAnalyser();    

analyser.fftSize = 2048;    

micSource.connect(analyser);    

document.getElementById("astate")    
    .textContent = "OK";    

monitor();

}

function monitor(){

const data =    
    new Uint8Array(    
        analyser.frequencyBinCount    
    );    

function loop(){    

    analyser.getByteTimeDomainData(data);    

    let sum = 0;    

    for(let i=0;i<data.length;i++){    

        const v =    
            (data[i]-128)/128;    

        sum += v*v;    
    }    

    const rms =    
        Math.sqrt(    
            sum/data.length    
        );    

    const level =    
        Math.min(    
            100,    
            Math.round(rms*300)    
        );    

    document.getElementById("level")    
        .textContent = level;    

    const now = Date.now();    

    if(    
        level > 20 &&    
        now-lastDetection > 1000    
    ){    

        lastDetection = now;    

        const time =    
            new Date()    
            .toLocaleTimeString();    

        const distance =    
            (    
                0.3 +    
                (100-level)*0.25    
            ).toFixed(2);    

        thunderEvents.push({    
            time,    
            level,    
            distance    
        });    

        const row =    
            document.createElement("tr");    

        row.innerHTML =    
            "<td>"+time+"</td>" +    
            "<td>"+distance+"</td>" +    
            "<td>"+level+"</td>";    

        document    
            .getElementById("log")    
            .prepend(row);    

        document    
            .getElementById("events")    
            .textContent =    
            thunderEvents.length;    
    }    

    requestAnimationFrame(loop);    
}    

loop();

}

setInterval(async () => {

if (thunderEvents.length === 0) {    
    return;    
}    

let msg =    
    "DONNERBERICHT\n";    

for (const e of thunderEvents) {    

    msg +=    
        e.time +    
        "|" +    
        e.distance +    
        "km" +    
        "\n";    
}    

console.log("SENDE:");    
console.log(msg);    

await sendGGWave(msg);

}, 60000);

function clearLog(){

    thunderEvents = [];

    document
        .getElementById("log")
        .innerHTML = "";

    document
        .getElementById("events")
        .textContent = "0";

    console.log("Tabelle geleert");
}

setInterval(() => {

    clearLog();

}, 300000); // 5 Minuten
    
document
.getElementById("startBtn")
.addEventListener(
"click",
startMic
);

document
.getElementById("testBtn")
.addEventListener(
"click",
async ()=>{

await sendGGWave(    
        "Test Nachricht."    
    );    

}

);

</script>  </body>

</html>
