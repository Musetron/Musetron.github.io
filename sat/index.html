<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8">
<title>Donner + GGWave Monitor</title><style>

body{
    font-family:Arial;
    margin:20px;
}

button{
    padding:10px;
    margin:5px;
}

#bar{
    width:100%;
    height:25px;
    background:#ddd;
}

#fill{
    width:0%;
    height:100%;
    background:steelblue;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

td,th{
    border:1px solid #ccc;
    padding:6px;
}

th{
    background:#eee;
}

#debug{
    margin-top:15px;
    padding:10px;
    background:#111;
    color:#0f0;
    font-family:monospace;
}

textarea{
    width:100%;
    height:100px;
}

</style></head><body><h2>🌩 Donner + GGWave Monitor</h2><button id="startBtn">🎤 Mikrofon starten</button>
<button id="testBtn">📡 Test senden</button>

<div id="bar">
<div id="fill"></div>
</div><p>
Pegel:
<span id="level">0</span>
</p><div id="debug">GGWAVE:
<span id="gstate">WAIT</span>

<br>AUDIO:
<span id="astate">WAIT</span>

<br>EVENTS:
<span id="events">0</span>

<br>RX:
<span id="rxstate">---</span>

</div><h3>Empfangene Nachricht</h3><textarea id="rxData" readonly></textarea><h3>Donner-Ereignisse</h3><table><thead>
<tr>
<th>Zeit</th>
<th>Entfernung km</th>
<th>Pegel</th>
</tr>
</thead><tbody id="log"></tbody></table><script src="js/ggwave.js"></script><script>

window.AudioContext =
window.AudioContext ||
window.webkitAudioContext;

let context = null;
let ggwave = null;
let parameters = null;
let instance = null;

let analyser = null;
let mediaStream = null;
let recorder = null;

let lastEvent = 0;
let thunderEvents = [];

function convertTypedArray(src, type) {

    const buffer =
        new ArrayBuffer(src.byteLength);

    new src.constructor(buffer).set(src);

    return new type(buffer);
}

async function initGGWave() {

    if (ggwave) return;

    ggwave = await ggwave_factory();

    context = new AudioContext({
        sampleRate:48000
    });

    parameters =
        ggwave.getDefaultParameters();

    parameters.sampleRateInp =
        context.sampleRate;

    parameters.sampleRateOut =
        context.sampleRate;

    instance =
        ggwave.init(parameters);

    document.getElementById("gstate")
        .innerText = "READY";

    console.log("GGWAVE READY");
}

function sendMessage(text){

    if(!instance) return;

    const waveform =
        ggwave.encode(
            instance,
            text,
            ggwave.ProtocolId.GGWAVE_PROTOCOL_AUDIBLE_FAST,
            10
        );

    const buf =
        convertTypedArray(
            waveform,
            Float32Array
        );

    const audioBuffer =
        context.createBuffer(
            1,
            buf.length,
            context.sampleRate
        );

    audioBuffer
        .getChannelData(0)
        .set(buf);

    const source =
        context.createBufferSource();

    source.buffer = audioBuffer;
    source.connect(context.destination);
    source.start(0);

    console.log("TX:",text);
}

async function startMic(){

    await initGGWave();

    const stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            audio:{

                echoCancellation:false,
                noiseSuppression:false,
                autoGainControl:false

            }

        });

    mediaStream =
        context.createMediaStreamSource(stream);

    analyser =
        context.createAnalyser();

    analyser.fftSize = 2048;

    mediaStream.connect(analyser);

    document.getElementById("astate")
        .innerText = "OK";

    const bufferSize = 1024;

    recorder =
        context.createScriptProcessor(
            bufferSize,
            1,
            1
        );

    recorder.onaudioprocess =
        function(e){

            const source =
                e.inputBuffer;

            const decoded =
                ggwave.decode(
                    instance,
                    convertTypedArray(
                        new Float32Array(
                            source.getChannelData(0)
                        ),
                        Int8Array
                    )
                );

            if(decoded && decoded.length > 0){

                const msg =
                    new TextDecoder("utf-8")
                    .decode(decoded);

                document
                    .getElementById("rxData")
                    .value = msg;

                document
                    .getElementById("rxstate")
                    .innerText = "MESSAGE";
            }
        };

    mediaStream.connect(recorder);
    recorder.connect(context.destination);

    loop();
}

function loop(){

    const data =
        new Uint8Array(
            analyser.frequencyBinCount
        );

    analyser.getByteTimeDomainData(data);

    let sum = 0;

    for(let i=0;i<data.length;i++){

        const v =
            (data[i]-128)/128;

        sum += v*v;
    }

    const rms =
        Math.sqrt(sum/data.length);

    const level =
        Math.min(
            100,
            Math.round(rms*300)
        );

    document
        .getElementById("fill")
        .style.width =
        level + "%";

    document
        .getElementById("level")
        .innerText =
        level;

    const now = Date.now();

    if(
        level > 20 &&
        now-lastEvent > 1000
    ){

        lastEvent = now;

        const time =
            new Date()
            .toLocaleTimeString();

        const distance =
            (
                0.3 +
                (100-level)*0.25
            ).toFixed(2);

        thunderEvents.push({

            time,
            distance,
            level

        });

        const row =
            document.createElement("tr");

        row.innerHTML =
            "<td>"+time+"</td>" +
            "<td>"+distance+"</td>" +
            "<td>"+level+"</td>";

        document
            .getElementById("log")
            .prepend(row);

        document
            .getElementById("events")
            .innerText =
            thunderEvents.length;
    }

    requestAnimationFrame(loop);
}

setInterval(()=>{

    if(
        !instance ||
        thunderEvents.length===0
    ){
        return;
    }

    const last10 =
        thunderEvents.slice(-10);

    let msg =
        "Donner Bericht. ";

    for(const e of last10){

        msg +=
            e.time +
            ", " +
            e.distance +
            " Kilometer. ";
    }

    sendMessage(msg);

},20000);

document
.getElementById("startBtn")
.addEventListener(
    "click",
    startMic
);

document
.getElementById("testBtn")
.addEventListener(
    "click",
    ()=>sendMessage(
        "Test Nachricht von GGWave"
    )
);

</script></body>
</html>
