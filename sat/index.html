<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Donner Monitor + GGWave Sender</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
}

button{
    padding:10px 15px;
    margin-right:10px;
}

#bar{
    width:100%;
    height:24px;
    background:#ddd;
    margin-top:10px;
}

#fill{
    height:100%;
    width:0%;
    background:steelblue;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
}

th{
    background:#eee;
}

#debug{
    margin-top:15px;
    padding:10px;
    background:#111;
    color:#0f0;
    font-family:monospace;
}
</style>
</head>

<body>

<h2>🌩 Donner Monitor + GGWave</h2>

<button id="startBtn">🎤 Mikrofon starten</button>
<button id="testBtn">📡 Test senden</button>

<div id="bar">
<div id="fill"></div>
</div>

<p>Pegel: <span id="level">0</span></p>

<div id="debug">
GGWAVE: <span id="gstate">WAIT</span><br>
AUDIO: <span id="astate">WAIT</span><br>
EVENTS: <span id="events">0</span><br>
LAST TX: <span id="lasttx">---</span>
</div>

<table>
<thead>
<tr>
<th>Zeit</th>
<th>Entfernung (km)</th>
<th>Pegel</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script src="js/ggwave.js"></script>

<script>

window.AudioContext =
window.AudioContext ||
window.webkitAudioContext;

let ggwave = null;
let context = null;
let parameters = null;
let instance = null;

let analyser = null;
let micSource = null;

let thunderEvents = [];
let lastDetection = 0;

function convertTypedArray(src,type){

    const buffer =
        new ArrayBuffer(src.byteLength);

    new src.constructor(buffer).set(src);

    return new type(buffer);
}

async function initGGWave(){

    if(instance) return;

    ggwave = await ggwave_factory();

    context = new AudioContext({
        sampleRate:48000
    });

    parameters =
        ggwave.getDefaultParameters();

    parameters.sampleRateInp =
        context.sampleRate;

    parameters.sampleRateOut =
        context.sampleRate;

    instance =
        ggwave.init(parameters);

    document.getElementById("gstate")
        .textContent = "READY";

    console.log("GGWAVE READY");
}

async function sendGGWave(text){

    await initGGWave();

    if(context.state !== "running"){
        await context.resume();
    }

    const waveform =
        ggwave.encode(
            instance,
            text,
            ggwave.ProtocolId.GGWAVE_PROTOCOL_AUDIBLE_FAST,
            10
        );

    const buf =
        convertTypedArray(
            waveform,
            Float32Array
        );

    const buffer =
        context.createBuffer(
            1,
            buf.length,
            context.sampleRate
        );

    buffer.getChannelData(0).set(buf);

    const source =
        context.createBufferSource();

    source.buffer = buffer;
    source.connect(context.destination);

    source.start();

    document.getElementById("lasttx")
        .textContent =
        new Date().toLocaleTimeString();

    console.log("TX:", text);
}

async function startMic(){

    await initGGWave();

    if(context.state !== "running"){
        await context.resume();
    }

    const stream =
        await navigator.mediaDevices.getUserMedia({

            audio:{
                echoCancellation:false,
                noiseSuppression:false,
                autoGainControl:false
            }

        });

    micSource =
        context.createMediaStreamSource(stream);

    analyser =
        context.createAnalyser();

    analyser.fftSize = 2048;

    micSource.connect(analyser);

    document.getElementById("astate")
        .textContent = "OK";

    monitor();
}

function monitor(){

    const data =
        new Uint8Array(
            analyser.frequencyBinCount
        );

    function loop(){

        analyser.getByteTimeDomainData(data);

        let sum = 0;

        for(let i=0;i<data.length;i++){

            const v =
                (data[i]-128)/128;

            sum += v*v;
        }

        const rms =
            Math.sqrt(
                sum/data.length
            );

        const level =
            Math.min(
                100,
                Math.round(rms*300)
            );

        document.getElementById("fill")
            .style.width =
            level + "%";

        document.getElementById("level")
            .textContent =
            level;

        const now = Date.now();

        if(
            level > 20 &&
            now-lastDetection > 1000
        ){

            lastDetection = now;

            const time =
                new Date()
                .toLocaleTimeString();

            const distance =
                (
                    0.3 +
                    (100-level)*0.25
                ).toFixed(2);

            thunderEvents.push({
                time,
                level,
                distance
            });

            const row =
                document.createElement("tr");

            row.innerHTML =
                "<td>"+time+"</td>" +
                "<td>"+distance+"</td>" +
                "<td>"+level+"</td>";

            document
                .getElementById("log")
                .prepend(row);

            document
                .getElementById("events")
                .textContent =
                thunderEvents.length;
        }

        requestAnimationFrame(loop);
    }

    loop();
}

setInterval(async ()=>{

    if(
        thunderEvents.length === 0
    ){
        return;
    }

    const latest =
        thunderEvents.slice(-10);

    let msg =
        "Donnerbericht. ";

    for(const e of latest){

        msg +=
            e.time +
            ", " +
            e.distance +
            " Kilometer. ";
    }

    await sendGGWave(msg);

},20000);

document
.getElementById("startBtn")
.addEventListener(
    "click",
    startMic
);

document
.getElementById("testBtn")
.addEventListener(
    "click",
    async ()=>{

        await sendGGWave(
            "Test Nachricht GGWave"
        );

    }
);

</script>

</body>
</html>
