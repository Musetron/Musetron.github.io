<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Donner Satellit</title>

<style>
body{
    font-family:Arial,sans-serif;
    font-size:14px;
    margin:20px;
    background:#fff;
    color:#222;
}

h2{
    margin:0 0 15px 0;
}

.toolbar{
    margin-bottom:15px;
}

button{
    width:260px;
    padding:8px;
    margin:4px;
    border:1px solid #bfbfbf;
    background:#f3f3f3;
    cursor:pointer;
}

button:hover{
    background:#e9e9e9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ccc;
    padding:6px 8px;
    text-align:left;
}

th{
    background:#efefef;
}

.status-table{
    width:500px;
    margin-bottom:15px;
}

.status-table td:first-child{
    width:150px;
    background:#f7f7f7;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Donner Satellit</h2>

<div class="toolbar">
    <button id="startBtn">Satellit Einschalten</button>
    <button id="playCsvBtn">CSV Als RAW Abspielen</button>
</div>

<table class="status-table">
<tr>
    <td>Protocol</td>
    <td>CSV RAW AUDIO</td>
</tr>
<tr>
    <td>Audio</td>
    <td id="astate">WAIT</td>
</tr>
<tr>
    <td>Events</td>
    <td id="events">0</td>
</tr>
<tr>
    <td>Last TX</td>
    <td id="lasttx">---</td>
</tr>
<tr>
    <td>Level</td>
    <td id="level">0</td>
</tr>
</table>

<table>
<thead>
<tr>
<th>Zeit</th>
<th>Kilometer</th>
<th>Pegel</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

window.AudioContext =
window.AudioContext ||
window.webkitAudioContext;

const audioCtx =
new AudioContext();

let analyser = null;
let micSource = null;

let thunderEvents = [];
let lastDetection = 0;
let autoSenderStarted = false;

async function startMic(){

    if(audioCtx.state !== "running"){
        await audioCtx.resume();
    }

    const stream =
    await navigator.mediaDevices.getUserMedia({
        audio:{
            echoCancellation:false,
            noiseSuppression:false,
            autoGainControl:false
        }
    });

    micSource =
    audioCtx.createMediaStreamSource(stream);

    analyser =
    audioCtx.createAnalyser();

    analyser.fftSize = 2048;

    micSource.connect(analyser);

    document
    .getElementById("astate")
    .textContent = "OK";

    monitor();

    if(!autoSenderStarted){

        autoSenderStarted = true;

        setInterval(() => {

            if(thunderEvents.length === 0){
                return;
            }

            playCSVasRAW();

        }, 60000);
    }
}

function monitor(){

    const data =
    new Uint8Array(
        analyser.frequencyBinCount
    );

    function loop(){

        analyser.getByteTimeDomainData(data);

        let sum = 0;

        for(let i=0;i<data.length;i++){

            const v =
            (data[i]-128)/128;

            sum += v*v;
        }

        const rms =
        Math.sqrt(sum/data.length);

        const level =
        Math.min(
            100,
            Math.round(rms*300)
        );

        document
        .getElementById("level")
        .textContent = level;

        const now = Date.now();

        if(
            level > 20 &&
            now-lastDetection > 1000
        ){

            lastDetection = now;

            const time =
            new Date()
            .toLocaleTimeString();

            const distance =
            (
                0.3 +
                (100-level)*0.25
            ).toFixed(2);

            thunderEvents.push({
                time,
                level,
                distance
            });

            const row =
            document.createElement("tr");

            row.innerHTML =
                "<td>"+time+"</td>" +
                "<td>"+distance+"</td>" +
                "<td>"+level+"</td>";

            document
            .getElementById("log")
            .prepend(row);

            document
            .getElementById("events")
            .textContent =
            thunderEvents.length;
        }

        requestAnimationFrame(loop);
    }

    loop();
}

async function playAlarmChord(
    freq1,
    freq2,
    duration
){

    if(audioCtx.state !== "running"){
        await audioCtx.resume();
    }

    const osc1 =
    audioCtx.createOscillator();

    const osc2 =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc1.type = "sine";
    osc2.type = "sine";

    osc1.frequency.value = freq1;
    osc2.frequency.value = freq2;

    gain.gain.value = 0.55;

    osc1.connect(gain);
    osc2.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc1.start();
    osc2.start();

    osc1.stop(
        audioCtx.currentTime +
        duration
    );

    osc2.stop(
        audioCtx.currentTime +
        duration
    );

    return new Promise(resolve => {

        setTimeout(
            resolve,
            duration * 1000
        );

    });
}

async function playCSVasRAW(){

    if(audioCtx.state !== "running"){
        await audioCtx.resume();
    }

    /* Aggressiver Startton */

    await playAlarmChord(
        880,
        1046,
        0.8
    );

    let csv =
`SYNC,SYNC,SYNC
DONNER-SATELLIT
ZEIT,KILOMETER,PEGEL
`;

    for(const e of thunderEvents){

        csv +=
            e.time + "," +
            e.distance + "," +
            e.level + "\n";
    }

    csv += "END\n";

    csv = csv.repeat(50);

    const encoder =
    new TextEncoder();

    const bytes =
    encoder.encode(csv);

    const sampleRate = 4000;

    const audioBuffer =
    audioCtx.createBuffer(
        1,
        bytes.length,
        sampleRate
    );

    const channel =
    audioBuffer.getChannelData(0);

    for(let i=0;i<bytes.length;i++){

        channel[i] =
        (bytes[i]-128)/128;
    }

    const source =
    audioCtx.createBufferSource();

    source.buffer =
    audioBuffer;

    source.connect(
        audioCtx.destination
    );

    source.start();

    document
    .getElementById("lasttx")
    .textContent =
    new Date()
    .toLocaleTimeString();

    console.log(csv);

    const duration =
    audioBuffer.duration * 1000;

    setTimeout(async ()=>{

        /* Tiefer, düsterer Endton */

        await playAlarmChord(
            440,
            523,
            1.0
        );

    }, duration);
}

document
.getElementById("startBtn")
.addEventListener(
    "click",
    startMic
);

document
.getElementById("playCsvBtn")
.addEventListener(
    "click",
    playCSVasRAW
);

</script>

</body>
</html>
