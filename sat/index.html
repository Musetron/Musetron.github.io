<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Camera Audio Sender</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff88;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    gap:10px;
}

canvas{
    width:260px;
    height:260px;
    image-rendering:pixelated;
    border:1px solid #00ff88;
}

button{
    padding:8px 14px;
    background:transparent;
    border:1px solid #00ff88;
    color:#00ff88;
    cursor:pointer;
}

button:hover{
    background:#00ff88;
    color:#000;
}

video{
    display:none;
}
</style>
</head>

<body>

<canvas id="canvas" width="128" height="128"></canvas>

<button id="sendBtn">SEND NOW</button>

<div id="status">idle</div>

<video id="video" autoplay playsinline></video>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");
const sendBtn = document.getElementById("sendBtn");

let audioCtx;
let grayFrame = null;

async function initCam()
{
    const stream =
        await navigator.mediaDevices.getUserMedia({
            video:true
        });

    video.srcObject = stream;
}

function previewLoop()
{
    ctx.drawImage(video,0,0,128,128);

    const img = ctx.getImageData(0,0,128,128);
    const d = img.data;

    for(let i=0;i<d.length;i+=4)
    {
        const g =
            0.299*d[i] +
            0.587*d[i+1] +
            0.114*d[i+2];

        d[i]=g;
        d[i+1]=g;
        d[i+2]=g;
    }

    ctx.putImageData(img,0,0);

    requestAnimationFrame(previewLoop);
}

function captureFrame()
{
    const img =
        ctx.getImageData(0,0,128,128).data;

    const gray =
        new Uint8Array(128*128);

    let p = 0;

    for(let i=0;i<img.length;i+=4)
    {
        gray[p++] = img[i];
    }

    grayFrame = gray;
}

function playTone(freq,duration,startTime)
{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(startTime);
    osc.stop(startTime + duration);
}

function sendFrame()
{
    if(!grayFrame) return;

    if(!audioCtx)
    {
        audioCtx = new AudioContext();
    }

    status.textContent = "sending...";

    const now = audioCtx.currentTime + 0.1;

    //
    // PREAMBLE
    //
    playTone(1900,0.5,now);

    //
    // START MARKER
    //
    playTone(1200,0.2,now + 0.55);

    //
    // PIXELS
    //
    const pixelDuration = 0.0015;

    let t = now + 0.8;

    for(let i=0;i<grayFrame.length;i++)
    {
        const gray = grayFrame[i];

        const freq =
            1500 +
            (gray/255) * 800;

        playTone(
            freq,
            pixelDuration,
            t
        );

        t += pixelDuration;
    }

    //
    // END MARKER
    //
    playTone(
        900,
        0.3,
        t + 0.1
    );

    const totalTime =
        (t + 0.5 - now) * 1000;

    setTimeout(()=>{
        status.textContent =
            "sent ✔ " +
            new Date().toLocaleTimeString();
    },totalTime);
}

sendBtn.onclick = () =>
{
    captureFrame();
    sendFrame();
};

setInterval(()=>
{
    captureFrame();
    sendFrame();
},10*60*1000);

initCam().then(()=>
{
    video.onloadedmetadata = () =>
    {
        previewLoop();
        status.textContent =
            "running (auto + manual)";
    };
});

</script>

</body>
</html>
