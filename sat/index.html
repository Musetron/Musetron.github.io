<!doctype html>
<html>
<body style="background:#000;color:#0f0;font-family:monospace;text-align:center;">
<video id="v" autoplay style="display:none"></video>
<button id="b">SEND SSTV</button>
<canvas id="c" width="128" height="128" style="border:1px solid #0f0"></canvas>

<script>
const video = document.getElementById("v");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let audioCtx;

async function cam(){
  video.srcObject = await navigator.mediaDevices.getUserMedia({video:true});
}

function getFrame(){
  ctx.drawImage(video,0,0,128,128);
  return ctx.getImageData(0,0,128,128).data;
}

function freqFromGray(g){
  return 800 + (1 - g/255) * 1600; // 800–2400 Hz
}

function tone(freq, time){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.frequency.value = freq;
  g.gain.value = 0.2;

  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + time);
}

async function send(){
  audioCtx = new AudioContext();

  const data = getFrame();
  const pixelTime = 0.002; // schnell (~0.3s/frame pro zeile * 128 ≈ 6s)

  for(let i=0;i<128*128;i++){
    const p = i*4;
    const gray = (data[p]+data[p+1]+data[p+2])/3;

    const f = freqFromGray(gray);

    tone(f, pixelTime);

    await new Promise(r=>setTimeout(r,pixelTime*1000));
  }
}

document.getElementById("b").onclick = async ()=>{
  await cam();
  send();
};
</script>
</body>
</html>
