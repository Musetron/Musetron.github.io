<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>RF Camera Decoder</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#00ff88;
    font-family:monospace;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:10px;
}

canvas{
    width:256px;
    height:256px;
    image-rendering:pixelated;
    border:1px solid #00ff88;
}

.status{
    opacity:.8;
}
</style>
</head>
<body>

<canvas id="canvas" width="128" height="128"></canvas>
<div id="status" class="status">waiting for signal...</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

const WIDTH = 128;
const HEIGHT = 128;

const START_FREQ = 1200;
const START_THRESHOLD = 120;

const FRAME_DURATION = 1.6;

let audioCtx;
let analyser;
let freqData;

let capturing = false;
let frameSamples = [];

async function init() {

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    audioCtx = new AudioContext();

    const source =
        audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();

    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0;

    source.connect(analyser);

    freqData =
        new Uint8Array(analyser.frequencyBinCount);

    listen();
}

function listen() {

    requestAnimationFrame(listen);

    if(capturing) return;

    analyser.getByteFrequencyData(freqData);

    const bin =
        Math.round(
            START_FREQ /
            (audioCtx.sampleRate / analyser.fftSize)
        );

    const level = freqData[bin] || 0;

    if(level > START_THRESHOLD){

        capturing = true;

        status.textContent =
            "start detected";

        captureFrame();
    }
}

function captureFrame(){

    const processor =
        audioCtx.createScriptProcessor(
            4096,
            1,
            1
        );

    frameSamples = [];

    const source =
        audioCtx.createMediaStreamSource(
            document.querySelector("audioStream") ||
            window.streamRef
        );

    processor.onaudioprocess = e => {

        const data =
            e.inputBuffer.getChannelData(0);

        frameSamples.push(
            new Float32Array(data)
        );
    };

    navigator.mediaDevices
        .getUserMedia({audio:true})
        .then(stream => {

            const mic =
                audioCtx.createMediaStreamSource(stream);

            mic.connect(processor);
            processor.connect(audioCtx.destination);

            setTimeout(() => {

                processor.disconnect();

                decode(frameSamples);

                capturing = false;

                status.textContent =
                    "waiting for signal...";

            }, FRAME_DURATION * 1000);

        });
}

function decode(chunks){

    let total = 0;

    for(const c of chunks)
        total += c.length;

    const samples =
        new Float32Array(total);

    let pos = 0;

    for(const c of chunks){

        samples.set(c,pos);

        pos += c.length;
    }

    const pixels = WIDTH * HEIGHT;

    const step =
        Math.floor(samples.length / pixels);

    const img =
        ctx.createImageData(
            WIDTH,
            HEIGHT
        );

    for(let i=0;i<pixels;i++){

        let sum = 0;

        const start = i * step;
        const end = start + step;

        for(let s=start;s<end;s++){

            sum += Math.abs(samples[s]);
        }

        const avg = sum / step;

        let gray =
            255 -
            Math.min(
                255,
                avg * 1800
            );

        gray = Math.max(
            0,
            Math.min(255, gray)
        );

        const p = i * 4;

        img.data[p]   = gray;
        img.data[p+1] = gray;
        img.data[p+2] = gray;
        img.data[p+3] = 255;
    }

    ctx.putImageData(img,0,0);

    status.textContent =
        "frame received " +
        new Date().toLocaleTimeString();
}

init();

</script>

</body>
</html>
