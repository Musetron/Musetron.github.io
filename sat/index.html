<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RF Camera Decoder</title>

<style>
body{
    background:#000;
    color:#0f0;
    font-family:monospace;
    text-align:center;
}

canvas{
    width:256px;
    height:256px;
    image-rendering:pixelated;
    border:1px solid #0f0;
}
</style>
</head>
<body>

<h3>RF Decoder</h3>

<canvas id="canvas" width="128" height="128"></canvas>
<br>
<button id="listen">LISTEN</button>

<div id="status">idle</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let audioCtx;
let recorder;
let chunks = [];

async function startListening(){

    const stream =
        await navigator.mediaDevices.getUserMedia({audio:true});

    audioCtx = new AudioContext();

    recorder = new MediaRecorder(stream);

    chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {

        const blob = new Blob(chunks);

        const arr = await blob.arrayBuffer();

        const audioBuffer =
            await audioCtx.decodeAudioData(arr);

        decodeFrame(audioBuffer);
    };

    status.textContent = "recording...";

    recorder.start();

    setTimeout(()=>{
        recorder.stop();
        status.textContent = "decoding...";
    }, 2000);
}

function decodeFrame(buffer){

    const data = buffer.getChannelData(0);

    const img =
        ctx.createImageData(128,128);

    const pixels = 128*128;

    const step =
        Math.floor(data.length / pixels);

    for(let i=0;i<pixels;i++){

        let sum = 0;

        const start = i*step;
        const end = start+step;

        for(let j=start;j<end;j++){
            sum += Math.abs(data[j]);
        }

        const avg = sum/step;

        let gray = 255 - Math.min(
            255,
            avg*1500
        );

        const p = i*4;

        img.data[p]   = gray;
        img.data[p+1] = gray;
        img.data[p+2] = gray;
        img.data[p+3] = 255;
    }

    ctx.putImageData(img,0,0);

    status.textContent = "frame decoded";
}

document.getElementById("listen")
.onclick = startListening;

</script>

</body>
</html>
