<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RF Waterfall</title>

<style>
body{
    background:black;
    color:#00ff88;
    font-family:monospace;
    text-align:center;
}

canvas{
    width:512px;
    height:512px;
    border:1px solid #00ff88;
    image-rendering:pixelated;
}
</style>
</head>
<body>

<h3>RF Waterfall Decoder</h3>

<canvas id="wf" width="256" height="512"></canvas>
<br>
<button id="start">START</button>

<script>

const canvas = document.getElementById("wf");
const ctx = canvas.getContext("2d");

let analyser;
let freqData;

async function start(){

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    const audioCtx =
        new AudioContext();

    const source =
        audioCtx.createMediaStreamSource(stream);

    analyser =
        audioCtx.createAnalyser();

    analyser.fftSize = 512;

    source.connect(analyser);

    freqData =
        new Uint8Array(
            analyser.frequencyBinCount
        );

    draw();
}

function draw(){

    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(freqData);

    ctx.drawImage(
        canvas,
        0,
        1,
        canvas.width,
        canvas.height - 1,
        0,
        0,
        canvas.width,
        canvas.height - 1
    );

    const y = canvas.height - 1;

    for(let x=0;x<canvas.width;x++){

        const i = Math.floor(
            x * freqData.length / canvas.width
        );

        const v = freqData[i];

        ctx.fillStyle =
            `rgb(${v},${v},${v})`;

        ctx.fillRect(x,y,1,1);
    }
}

document.getElementById("start")
.onclick = start;

</script>

</body>
</html>
