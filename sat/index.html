<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kamera → Audio Generator</title>
  <style>
    body { font-family: sans-serif; background:#111; color:#eee; text-align:center; }
    video, canvas { margin-top:10px; }
  </style>
</head>
<body>

<h2>Kamera → Quadrat → Audio</h2>

<video id="video" autoplay playsinline width="320"></video>
<canvas id="canvas" style="display:none;"></canvas>

<p>Status: <span id="status">Init...</span></p>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  video.srcObject = stream;
  status.textContent = "Kamera läuft";
}

function captureSquareFrame() {
  const w = video.videoWidth;
  const h = video.videoHeight;

  const size = Math.min(w, h);
  const sx = (w - size) / 2;
  const sy = (h - size) / 2;

  canvas.width = size;
  canvas.height = size;

  ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);

  return ctx.getImageData(0, 0, size, size);
}

// Wandelt Pixel → Audio PCM
function imageToAudio(imageData) {
  const data = imageData.data;

  const sampleRate = 44100;
  const duration = 2; // Sekunden
  const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
  const channel = buffer.getChannelData(0);

  // einfache Abbildung: Pixelbytes -> Waveform
  for (let i = 0; i < channel.length; i++) {
    const idx = (i * 4) % data.length;
    const r = data[idx] / 255;
    const g = data[idx + 1] / 255;
    const b = data[idx + 2] / 255;

    // kombinierte Wellenform
    channel[i] = (r * 0.5 + g * 0.3 + b * 0.2) * 2 - 1;
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start();
}

async function loop() {
  const img = captureSquareFrame();
  status.textContent = "Frame aufgenommen → Audio wird generiert";
  imageToAudio(img);
}

startCamera().then(() => {
  loop();
  setInterval(loop, 60 * 1000); // jede Minute
});
</script>

</body>
</html>
