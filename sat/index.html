<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Donner + GGWAVE FINAL</title>

<style>
body { font-family: Arial; margin: 20px; }

#bar { width: 100%; height: 20px; background: #ddd; }
#fill { height: 100%; width: 0%; background: steelblue; }

table { width: 100%; margin-top: 15px; border-collapse: collapse; }
td, th { border: 1px solid #ccc; padding: 6px; }
th { background: #eee; }

#debug {
    margin-top: 15px;
    padding: 10px;
    background: #111;
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
}
button { padding: 10px; margin: 5px; }
</style>
</head>

<body>

<h2>🌩️ Donner + GGWAVE FINAL</h2>

<button onclick="startMic()">🎤 Mikro starten</button>

<div id="bar"><div id="fill"></div></div>
<p>Pegel: <span id="lvl">0</span></p>

<div id="debug">
GGWAVE: <span id="gstatus">WAIT</span><br>
AUDIO: <span id="astatus">WAIT</span><br>
EVENTS: <span id="ecount">0</span>
</div>

<table>
<thead>
<tr><th>Zeit</th><th>Entfernung (km)</th><th>Pegel</th></tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>
// ----------------------
// STATE
// ----------------------
let ggwave = null;
let instance = null;
let context = null;

let audioCtx = null;
let analyser = null;
let data = null;

let events = [];
let last = 0;

// ----------------------
// GGWAVE INIT (CORRECT)
// ----------------------
ggwave_factory().then(obj => {
    ggwave = obj;

    context = new AudioContext({ sampleRate: 48000 });

    const params = ggwave.getDefaultParameters();
    params.sampleRateInp = context.sampleRate;
    params.sampleRateOut = context.sampleRate;

    instance = ggwave.init(params);

    document.getElementById("gstatus").innerText = "READY";

    console.log("GGWAVE READY", { ggwave, instance });
});

// ----------------------
// SAFE SPEAK (REAL GGWAVE)
// ----------------------
function waverSpeak(text) {
    if (!ggwave || !instance || !context) {
        console.warn("GGWAVE NOT READY");
        return;
    }

    console.log("SPEAK:", text);

    const waveform = ggwave.encode(
        instance,
        text,
        ggwave.ProtocolId.GGWAVE_PROTOCOL_AUDIBLE_FAST,
        10
    );

    const buf = new Float32Array(waveform);

    const buffer = context.createBuffer(1, buf.length, context.sampleRate);
    buffer.getChannelData(0).set(buf);

    const source = context.createBufferSource();
    source.buffer = buffer;
    source.connect(context.destination);
    source.start();
}

// ----------------------
// MICROPHONE
// ----------------------
async function startMic() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            }
        });

        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;

        const src = audioCtx.createMediaStreamSource(stream);
        src.connect(analyser);

        data = new Uint8Array(analyser.frequencyBinCount);

        document.getElementById("astatus").innerText = "OK";

        loop();

    } catch (e) {
        document.getElementById("astatus").innerText = "BLOCKED";
        alert("Mikrofon blockiert!");
        console.error(e);
    }
}

// ----------------------
// AUDIO LOOP
// ----------------------
function loop() {
    analyser.getByteTimeDomainData(data);

    let sum = 0;
    for (let i = 0; i < data.length; i++) {
        let v = (data[i] - 128) / 128;
        sum += v * v;
    }

    const rms = Math.sqrt(sum / data.length);
    const level = Math.min(100, Math.round(rms * 300));

    document.getElementById("fill").style.width = level + "%";
    document.getElementById("lvl").innerText = level;

    const now = Date.now();

    if (level > 20 && now - last > 800) {
        last = now;

        const time = new Date().toLocaleTimeString();
        const dist = Math.max(0.3, Math.min(25, 20 * Math.exp(-0.03 * level))).toFixed(2);

        events.push({ time, dist, level });

        const row = document.createElement("tr");
        row.innerHTML = `<td>${time}</td><td>${dist}</td><td>${level}</td>`;
        document.getElementById("log").prepend(row);

        document.getElementById("ecount").innerText = events.length;
    }

    requestAnimationFrame(loop);
}

// ----------------------
// 20s BROADCAST
// ----------------------
setInterval(() => {
    if (events.length === 0) return;

    const last10 = events.slice(-10);

    let msg = "Donner Übersicht. ";
    for (const e of last10) {
        msg += `${e.time}, ${e.dist} Kilometer. `;
    }

    waverSpeak(msg);

}, 20000);

</script>

<!-- GGWAVE -->
<script src="js/ggwave.js"></script>

</body>
</html>
