<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Magnetfeld zu Ton</title>
</head>
<body>

<h2>Handy Magnetfeld → Ton</h2>
<button onclick="start()">Start</button>

<p id="werte">Warte...</p>

<script>
let audioCtx;
let osc;

function start(){

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.connect(audioCtx.destination);
  osc.start();

  if ("Magnetometer" in window) {

    const sensor = new Magnetometer({frequency: 30});

    sensor.addEventListener("reading", () => {

      let x = sensor.x;
      let y = sensor.y;
      let z = sensor.z;

      let strength = Math.sqrt(x*x + y*y + z*z);

      document.getElementById("werte").innerText =
        "Magnetfeld: " + strength.toFixed(2);

      // Magnetfeld -> Tonfrequenz
      osc.frequency.value = 200 + strength * 5;

    });

    sensor.start();

  } else {
    alert("Magnetometer wird nicht unterstützt");
  }
}
</script>

</body>
</html>
