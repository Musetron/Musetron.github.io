<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Chaos + Worm</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
  }

  .img {
    position: absolute;
    width: 30px;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.2);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  html, body {
    margin:0; padding:0; overflow:hidden; touch-action:none;
    background:#111;
    filter: blur(2px);
  }

  canvas { 
    display:block;
    filter: blur(2px);
  }

  .tip {
    display: none;
  }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
// =======================
// CHAOS SWARM (FIRST CODE)
// =======================

const imageUrl = "https://iili.io/qZQw63N.th.png";
let currentImages = [];

function spawnOne() {
  if (currentImages.length >= 8) return;

  const img = document.createElement("img");
  img.src = imageUrl;
  img.className = "img";

  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;

  img.style.left = x + "px";
  img.style.top = y + "px";

  document.body.appendChild(img);
  currentImages.push(img);

  const targetOpacity = 0.2 + Math.random() * 0.8;

  setTimeout(() => {
    img.style.opacity = targetOpacity;
    img.style.transform = "scale(1)";
  }, 10);

  const intensity = 8 + Math.random() * 15;
  const speed = 5 + Math.random() * 25;

  const isMoving = Math.random() < 0.6;

  let vx = (Math.random() - 0.5) * 2;
  let vy = (Math.random() - 0.5) * 2;

  let driftVX = (Math.random() - 0.5) * 0.3;
  let driftVY = (Math.random() - 0.5) * 0.3;

  let running = true;

  function animate() {
    if (!running) return;

    const jitterX = (Math.random() - 0.5) * intensity;
    const jitterY = (Math.random() - 0.5) * intensity;
    const rotate = (Math.random() - 0.5) * 30;

    if (isMoving) {
      vx += (Math.random() - 0.5) * 0.5;
      vy += (Math.random() - 0.5) * 0.5;

      vx *= 0.95;
      vy *= 0.95;

      x += vx;
      y += vy;
    }

    driftVX += (Math.random() - 0.5) * 0.02;
    driftVY += (Math.random() - 0.5) * 0.02;

    driftVX *= 0.99;
    driftVY *= 0.99;

    x += driftVX;
    y += driftVY;

    if (x < 0 || x > window.innerWidth) {
      vx *= -1;
      driftVX *= -1;
    }
    if (y < 0 || y > window.innerHeight) {
      vy *= -1;
      driftVY *= -1;
    }

    img.style.left = x + "px";
    img.style.top = y + "px";

    img.style.transform = `
      translate(${jitterX}px, ${jitterY}px)
      rotate(${rotate}deg)
      scale(1)
    `;

    setTimeout(animate, speed);
  }

  animate();

  const lifetime = 1500 + Math.random() * 4000;

  setTimeout(() => {
    running = false;

    img.style.opacity = 0;
    img.style.transform = "scale(0.1)";

    setTimeout(() => {
      img.remove();
      currentImages = currentImages.filter(i => i !== img);
    }, 300);
  }, lifetime);
}

function randomLoop() {
  spawnOne();
  const next = 100 + Math.random() * 800;
  setTimeout(randomLoop, next);
}

randomLoop();
</script>

<script>
// =======================
// WORM (SECOND CODE)
// =======================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const wormImg = new Image();
wormImg.src = "https://iili.io/qvUJL2S.png";
const SEGMENTS = 25;
let skeleton = [];
let segmentLength = 0;

wormImg.onload = () => {
    segmentLength = wormImg.width / SEGMENTS;
    for(let i=0;i<SEGMENTS;i++){
        skeleton.push({x: canvas.width/2 - i*segmentLength, y: canvas.height/2});
    }
    animate();
};

const tip = { x: 50, y: 50 };

function random(min, max) { return Math.random() * (max - min) + min; }

function getNextTarget(currentX, currentY) {
  let x, y;
  if (Math.random() < 0.7) {
    x = currentX + random(-80, 80);
    y = currentY + random(-80, 80);
  } else {
    x = currentX + random(-250, 250);
    y = currentY + random(-250, 250);
  }
  x = Math.max(10, Math.min(window.innerWidth - 10, x));
  y = Math.max(10, Math.min(window.innerHeight - 10, y));
  return { x, y };
}

function moveTo(x, y, duration = null) {
  return new Promise(resolve => {
    const startX = tip.x;
    const startY = tip.y;
    const distance = Math.hypot(x - startX, y - startY);
    if (!duration) duration = Math.max(400, distance * random(2, 4));

    let startTime = null;
    const wobble = [];
    for (let i = 0; i < 3; i++) {
      wobble.push({ freq: random(0.3, 1.5), amp: random(1.5, 6), phase: random(0, Math.PI * 2) });
    }

    function animateTip(time) {
      if (!startTime) startTime = time;
      let t = (time - startTime) / duration;
      if (t > 1) t = 1;
      const ease = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;

      let tipX = startX + (x - startX) * ease;
      let tipY = startY + (y - startY) * ease;

      wobble.forEach(w => {
        tipX += Math.sin(t * Math.PI * 2 * w.freq + w.phase) * w.amp * (1 - t);
        tipY += Math.cos(t * Math.PI * 2 * w.freq + w.phase) * w.amp * (1 - t);
      });

      tip.x = tipX;
      tip.y = tipY;

      if (t < 1) requestAnimationFrame(animateTip);
      else resolve();
    }
    requestAnimationFrame(animateTip);
  });
}

async function microPause(duration) {
  const pauseStart = performance.now();
  while (performance.now() - pauseStart < duration) {
    const t = (performance.now() - pauseStart) / duration;
    tip.x += Math.sin(t * Math.PI * 2 * random(0.5,1.2)) * random(0.1,1.2);
    tip.y += Math.cos(t * Math.PI * 2 * random(0.5,1.2)) * random(0.1,1.2);
    await new Promise(r => requestAnimationFrame(r));
  }
}

async function loopMarker() {
  while(true) {
    const { x, y } = getNextTarget(tip.x, tip.y);
    await moveTo(x, y);
    await microPause(random(150, 1200));
  }
}
loopMarker();

function getCatmullRomPoint(p0,p1,p2,p3,t){
    const t2 = t*t, t3 = t2*t;
    const x = 0.5*((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x -5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x-3*p2.x + p3.x)*t3);
    const y = 0.5*((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y -5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y-3*p2.y + p3.y)*t3);
    return {x,y};
}

function updateSkeleton(){
    let head = skeleton[0];
    let dx = tip.x - head.x;
    let dy = tip.y - head.y;
    let angle = Math.atan2(dy, dx);
    head.x += Math.cos(angle)*5;
    head.y += Math.sin(angle)*5;

    for(let i=1;i<SEGMENTS;i++){
        let prev = skeleton[i-1];
        let seg = skeleton[i];
        let dx = seg.x - prev.x;
        let dy = seg.y - prev.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        let diff = dist - segmentLength;
        let offsetX = (dx/dist)*diff;
        let offsetY = (dy/dist)*diff;
        seg.x -= offsetX;
        seg.y -= offsetY;
    }
}

function drawWorm(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const imgH = wormImg.height;
    const steps = wormImg.width;

    for(let i=0;i<steps;i++){
        const t = i / steps * (SEGMENTS-3) + 1;
        const seg = Math.floor(t);
        const localT = t - seg;

        const p0 = skeleton[Math.max(seg-1,0)];
        const p1 = skeleton[seg];
        const p2 = skeleton[Math.min(seg+1,SEGMENTS-1)];
        const p3 = skeleton[Math.min(seg+2,SEGMENTS-1)];

        const pos = getCatmullRomPoint(p0,p1,p2,p3,localT);

        const nextT = Math.min(localT + 0.01,1);
        const nextPos = getCatmullRomPoint(p0,p1,p2,p3,nextT);

        const angle = Math.atan2(nextPos.y - pos.y, nextPos.x - pos.x);

        ctx.save();
        ctx.translate(pos.x,pos.y);
        ctx.rotate(angle);
        ctx.drawImage(wormImg, i,0,1,imgH, 0,-imgH/2,1,imgH);
        ctx.restore();
    }
}

function animate(){
    updateSkeleton();
    drawWorm();
    requestAnimationFrame(animate);
}
</script>

</body>
</html>
