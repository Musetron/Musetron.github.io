<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fixed Camera Swarm with Post-Processing Blur</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: black;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: true });

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= IMAGES =================
function load(src) {
    const img = new Image();
    img.src = src;

    img.onload = () => console.log("Loaded:", src);
    img.onerror = () => console.error("FAILED:", src);

    return img;
}

const bg = load("Background.jpg");
const fly = load("FlyBy.jpg");
const dirtImg = load("Dirt.png");
const viewImg = load("View.jpg");
const swarmImg = load("https://iili.io/qZQw63N.th.png");

// ================= CAMERA =================
const cam = {
    x: 0,
    y: 0,
    zoom: 2.8
};

let dragging = false;
let lastX = 0;
let lastY = 0;

// ================= MOTION BLUR =================
let lastCamX = 0;
let lastCamY = 0;
let camSpeed = 0;

// ================= INPUT =================
canvas.addEventListener("pointerdown", (e) => {
    dragging = true;
    canvas.setPointerCapture(e.pointerId);

    lastX = e.clientX;
    lastY = e.clientY;
});

canvas.addEventListener("pointerup", () => dragging = false);
canvas.addEventListener("pointercancel", () => dragging = false);

canvas.addEventListener("pointermove", (e) => {
    if (!dragging) return;

    cam.x += (e.clientX - lastX) / cam.zoom;
    cam.y += (e.clientY - lastY) / cam.zoom;

    lastX = e.clientX;
    lastY = e.clientY;
});

// ================= STATE =================
let t = 0;
let fx = 0, fy = 0;
let vx = 0, vy = 0;

let dirt = [];
let swarm = [];

// ================= OFFSCREENS =================
const off = document.createElement("canvas");
const octx = off.getContext("2d");

const finalOff = document.createElement("canvas");
const foctx = finalOff.getContext("2d");

// ================= DIRT =================
function spawnDirt() {
    dirt = [];
    for (let i = 0; i < 3; i++) {
        dirt.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: 200 + Math.random() * 500,
            alpha: 0.08 + Math.random() * 0.2
        });
    }
}
spawnDirt();

// ================= SWARM =================
function spawnStar() {
    if (swarm.length >= 25) return;

    const fromLeft = Math.random() < 0.5;

    swarm.push({
        x: fromLeft ? -80 : window.innerWidth + 80,
        y: Math.random() * window.innerHeight * 0.3,

        vx: fromLeft ? (2 + Math.random() * 5) : -(2 + Math.random() * 5),
        vy: 2 + Math.random() * 6,

        drift: (Math.random() - 0.5) * 1.2,

        size: 8 + Math.random() * 90,
        opacity: 0.02 + Math.random() * 0.12,
        blur: 2 + Math.random() * 10,

        rot: (Math.random() - 0.5) * 40,
        seed: Math.random() * 1000,

        life: 0,
        maxLife: 2500 + Math.random() * 3500
    });
}
setInterval(spawnStar, 160);

// ================= DRAW =================
function draw() {
    requestAnimationFrame(draw);

    t += 0.01;

    const w = canvas.width;
    const h = canvas.height;

    const dxCam = cam.x - lastCamX;
    const dyCam = cam.y - lastCamY;

    camSpeed = Math.sqrt(dxCam * dxCam + dyCam * dyCam);

    lastCamX = cam.x;
    lastCamY = cam.y;

    ctx.fillStyle = `rgba(0,0,0,${0.15 + camSpeed * 0.08})`;
    ctx.fillRect(0, 0, w, h);

    // ================= CAMERA =================
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-w / 2 + cam.x, -h / 2 + cam.y);

    // BACKGROUND
    if (bg.complete) {
        ctx.drawImage(bg, 0, 0, w, h);
    }

    // WARP (unchanged)
    const slice = 12;

    for (let y = 0; y < h; y += slice) {
        for (let x = 0; x < w; x += slice) {

            let dx = Math.sin(x * 0.01 + t) * 4;
            let dy = Math.cos(y * 0.01 + t) * 4;

            ctx.drawImage(
                bg,
                (x + dx) * (bg.width / w),
                (y + dy) * (bg.height / h),
                slice * (bg.width / w),
                slice * (bg.height / h),
                x, y,
                slice, slice
            );
        }
    }

    // FLY
    vx += (Math.random() - 0.5) * 0.2;
    vy += (Math.random() - 0.5) * 0.2;

    vx *= 0.96;
    vy *= 0.96;

    fx += vx;
    fy += vy;

    if (fx > w) fx = -w;
    if (fy > h) fy = -h;

    ctx.globalAlpha = 0.18;
    ctx.globalCompositeOperation = "screen";
    ctx.drawImage(fly, fx, fy, w, h);

    // DIRT
    ctx.globalCompositeOperation = "multiply";

    for (let d of dirt) {
        ctx.globalAlpha = d.alpha;
        ctx.drawImage(dirtImg, d.x, d.y, d.size, d.size);
    }

    // ================= SWARM =================
    ctx.globalCompositeOperation = "screen";

    for (let i = swarm.length - 1; i >= 0; i--) {
        let s = swarm[i];

        s.life += 16;

        s.vx *= 0.985;
        s.x += s.vx + s.drift;
        s.y += s.vy;
        s.vy += 0.03;

        const smallness = s.size / 100;

        const baseSpeed = 0.02 + (1 - smallness) * 0.06;
        const baseAmp = (1 - smallness) * 6;

        const jx = Math.sin(s.seed + s.life * baseSpeed) * baseAmp;
        const jy = Math.cos(s.seed * 1.7 + s.life * baseSpeed) * baseAmp;

        let fade = 1 - (s.life / s.maxLife);
        if (fade < 0) fade = 0;

        ctx.save();
        ctx.globalAlpha = s.opacity * fade;
        ctx.filter = `blur(${s.blur}px)`;

        ctx.translate(s.x + jx, s.y + jy);
        ctx.rotate(s.rot * Math.PI / 180);

        ctx.drawImage(swarmImg, -s.size / 2, -s.size / 2, s.size, s.size);

        ctx.restore();

        if (s.life > s.maxLife || s.y > h + 300) {
            swarm.splice(i, 1);
        }
    }

    ctx.restore();

    // ================= MASK =================
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
    ctx.filter = "none";

    off.width = w;
    off.height = h;

    octx.drawImage(viewImg, 0, 0, w, h);

    const imgData = octx.getImageData(0, 0, w, h);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
        const lum = (data[i] + data[i+1] + data[i+2]) / 3;
        data[i+3] = (1 - lum / 255) * 255;
    }

    octx.putImageData(imgData, 0, 0);
    ctx.drawImage(off, 0, 0, w, h);

    // ================= POST BLUR =================
    finalOff.width = w;
    finalOff.height = h;
    foctx.drawImage(canvas, 0, 0);

    ctx.clearRect(0, 0, w, h);
    ctx.filter = "blur(1.5px)";
    ctx.drawImage(finalOff, 0, 0);
    ctx.filter = "none";
}

// ================= START =================
let loaded = 0;
const imgs = [bg, fly, dirtImg, viewImg, swarmImg];

imgs.forEach(img => {
    img.onload = () => {
        loaded++;
        if (loaded === imgs.length) {
            draw();
        }
    };
    img.onerror = () => {
        console.error("Missing file:", img.src);
        loaded++;
        if (loaded === imgs.length) {
            draw();
        }
    };
});
</script>

</body>
</html>
