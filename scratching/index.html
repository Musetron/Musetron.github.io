<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Raw Swipe Speed - Serial Terminal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #111;
      color: #0f0;
      touch-action: none;
      box-sizing: border-box;
    }

    /* Controls-Bereich für Buttons */
    #controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      padding: 15px;
      background: #151515;
      border-bottom: 1px solid #333;
    }

    #serial-connect {
      background: #331111;
      color: #ff5555;
      border: 2px solid #552222;
      padding: 15px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s ease;
    }

    #serial-connect.connected {
      background: #003300;
      color: #0f0;
      border-color: #0f0;
    }

    #hold-btn {
      background: #222;
      color: #888;
      border: 2px solid #444;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s ease;
      flex: 1;
      max-width: 300px;
      text-align: center;
    }

    /* Status-Styling für den Button */
    #hold-btn.active {
      background: #003300;
      color: #0f0;
      border-color: #0f0;
    }

    /* Oberes Touchfeld */
    #touch-zone {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      border: 4px dashed #333;
      margin: 10px;
      border-radius: 8px;
      cursor: grab;
      user-select: none;
    }
    
    #touch-zone:active {
      cursor: grabbing;
    }

    #touch-zone-label {
      font-size: 20px;
      color: #555;
      pointer-events: none;
    }

    /* Untere Terminal-Konsole */
    #console {
      height: 35vh;
      border-top: 2px solid #0f0;
      background: #000;
      padding: 15px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    #terminal-log {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-entry {
      color: #0f0;
      display: inline;
    }

    /* Farbe für die Button-Logs im Terminal */
    .log-entry.btn-status {
      color: #00bcff;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="controls">
  <button id="serial-connect">COM-PORT VERBINDEN</button>
  <div id="hold-btn">BUTTON HALTEN</div>
</div>

<div id="touch-zone">
  <div id="touch-zone-label">Hier klicken & swipen (Immer aktiv)</div>
</div>

<div id="console">
  <div id="terminal-log"></div>
</div>

<script>
let lastY = null;
let lastTime = null;
let port = null;
let writer = null;

const touchZone = document.getElementById("touch-zone");
const logContainer = document.getElementById("terminal-log");
const consoleWrapper = document.getElementById("console");
const holdBtn = document.getElementById("hold-btn");
const connectBtn = document.getElementById("serial-connect");

const MAX_LOG_LINES = 500; 

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

// Web Serial Verbindung herstellen
connectBtn.addEventListener("click", async () => {
  if (port) {
    printToTerminal("\n[Serial] Bereits verbunden oder wird neu initialisiert.\n", true);
    return;
  }
  
  try {
    // Öffnet den Browser-Dialog zur Auswahl des COM-Ports
    port = await navigator.serial.requestPort();
    // Standard-Baudrate ist 9600 (kann bei Bedarf auf 115200 geändert werden)
    await port.open({ baudRate: 9600 }); 
    writer = port.writable.getWriter();
    
    connectBtn.textContent = "VERBUNDEN";
    connectBtn.classList.add("connected");
    printToTerminal("\n[Serial] Verbindung erfolgreich hergestellt!\n", true);
  } catch (err) {
    console.error("Fehler bei Seriell-Verbindung:", err);
    alert("Verbindung fehlgeschlagen. Bitte stelle sicher, dass du Google Chrome, MS Edge oder Opera nutzt.");
  }
});

// Daten asynchron über die echte serielle Schnittstelle senden
async function sendToSerialCom(text) {
  if (writer) {
    try {
      const encoder = new TextEncoder();
      // Sendet den Text gefolgt von einem Leerzeichen über die COM-Schnittstelle
      await writer.write(encoder.encode(text + " "));
    } catch (err) {
      console.error("Fehler beim Senden:", err);
    }
  }
}

// Zentrale Log-Funktion (Web-Terminal + Seriell-Schnittstelle)
function printToTerminal(text, isBtnLog = false) {
  const span = document.createElement("span");
  span.className = isBtnLog ? "log-entry btn-status" : "log-entry";
  
  span.textContent = text + " ";
  logContainer.appendChild(span);

  // Sende parallel an den echten COM-Port
  sendToSerialCom(text);

  while (logContainer.children.length > MAX_LOG_LINES) {
    logContainer.removeChild(logContainer.firstChild);
  }

  consoleWrapper.scrollTop = consoleWrapper.scrollHeight;
}

// BUTTON LOGIK (Schreibt ON/OFF in die Konsole)
let isBtnPressed = false;

function buttonDown() {
  if (isBtnPressed) return; 
  isBtnPressed = true;
  holdBtn.classList.add("active");
  printToTerminal("on", true);
}

function buttonUp() {
  if (!isBtnPressed) return;
  isBtnPressed = false;
  holdBtn.classList.remove("active");
  printToTerminal("off", true);
}

// Maus-Events für Button
holdBtn.addEventListener("mousedown", buttonDown);
window.addEventListener("mouseup", buttonUp);

// Touch-Events für Button
holdBtn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  buttonDown();
});
holdBtn.addEventListener("touchend", (e) => {
  e.preventDefault();
  buttonUp();
});


// TOUCH-EVENTS FÜR DIE SWIPE-ZONE
touchZone.addEventListener("touchstart", (e) => {
  lastY = e.touches[0].clientY;
  lastTime = performance.now();
});

touchZone.addEventListener("touchmove", (e) => {
  const y = e.touches[0].clientY;
  const t = performance.now();

  if (lastY === null || lastTime === null) {
    lastY = y;
    lastTime = t;
    return;
  }

  const dy = y - lastY;
  const dt = t - lastTime;

  let value = 0;

  if (dt > 0) {
    const speed = Math.abs(dy) / dt;
    value = speed * 2.5;
    
    value = clamp(value, 0, 9.9);
    printToTerminal(value.toFixed(1));
  }

  lastY = y;
  lastTime = t;
});

touchZone.addEventListener("touchend", () => {
  if (lastY !== null) {
    printToTerminal("0.0");
  }
  lastY = null;
  lastTime = null;
});


// MAUS-EVENTS FÜR DIE SWIPE-ZONE
let mouseDown = false;

touchZone.addEventListener("mousedown", (e) => {
  mouseDown = true;
  lastY = e.clientY;
  lastTime = performance.now();
});

window.addEventListener("mousemove", (e) => {
  if (!mouseDown) return;

  const y = e.clientY;
  const t = performance.now();

  if (lastY === null || lastTime === null) {
    lastY = y;
    lastTime = t;
    return;
  }

  const dy = y - lastY;
  const dt = t - lastTime;

  let value = 0;

  if (dt > 0) {
    const speed = Math.abs(dy) / dt;
    value = speed * 5;
    
    value = clamp(value, 0, 9.9);
    printToTerminal(value.toFixed(1));
  }

  lastY = y;
  lastTime = t;
});

window.addEventListener("mouseup", () => {
  if (mouseDown) {
    printToTerminal("0.0");
  }
  mouseDown = false;
});
</script>

</body>
</html>
