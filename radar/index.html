<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panzer Motor Sound Simulator</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2b2b2a;
            color: #d4d4d2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #3a3a38;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border: 2px solid #555552;
            text-align: center;
            width: 350px;
        }
        button {
            background-color: #5c674e;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
        }
        button:hover { background-color: #717e60; }
        button:disabled { background-color: #444; color: #777; cursor: not-allowed; }
        .slider-container { margin-top: 20px; }
        input[type=range] {
            width: 100%;
            margin: 15px 0;
            accent-color: #8da075;
        }
        .status { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panzer Motor</h2>
    <button id="startBtn">1. MOTOR STARTEN</button>
    
    <div class="slider-container">
        <label for="gasSlider"><strong>DREHZAHL / GAS</strong></label>
        <input type="range" id="gasSlider" min="0" max="1" step="0.01" value="0" disabled>
        <div id="sliderValue">Standgas (0%)</div>
    </div>
    
    <div class="status" id="statusText">Warte auf Start...</div>
</div>

<script>
// Audio-Kontext und Variablen für die Sound-Knoten
let audioCtx;
let sounds = {
    engine: { url: 'engine.wav', buffer: null, source: null, gainNode: null },
    gas: { url: 'gas.wav', buffer: null, source: null, gainNode: null },
    metall: { url: 'metall.wav', buffer: null, source: null, gainNode: null },
    static: { url: 'static.wav', buffer: null, source: null, gainNode: null },
    noise: { url: 'noise.wav', buffer: null, source: null, gainNode: null }
};

const startBtn = document.getElementById('startBtn');
const gasSlider = document.getElementById('gasSlider');
const statusText = document.getElementById('statusText');
const sliderValue = document.getElementById('sliderValue');

startBtn.addEventListener('click', async () => {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        statusText.innerText = "Lade Sounddateien...";
        startBtn.disabled = true;
        
        try {
            // Alle Sounds parallel laden
            await Promise.all(Object.keys(sounds).map(key => loadSound(key)));
            
            // Sounds starten (im Loop)
            initAndStartSounds();
            
            statusText.innerText = "Motor läuft.";
            gasSlider.disabled = false;
            updateSounds(0); // Initialisiere mit Standgas
        } catch (error) {
            statusText.innerText = "Fehler beim Laden der Sounds: " + error.message;
            startBtn.disabled = false;
        }
    }
});

// Funktion zum Laden der Dateien via Fetch
async function loadSound(key) {
    const response = await fetch(sounds[key].url);
    const arrayBuffer = await response.arrayBuffer();
    sounds[key].buffer = await audioCtx.decodeAudioData(arrayBuffer);
}

// Initialisiert die Loops und Nodes
function initAndStartSounds() {
    Object.keys(sounds).forEach(key => {
        const sound = sounds[key];
        
        // Source Node erstellen
        sound.source = audioCtx.createBufferSource();
        sound.source.buffer = sound.buffer;
        sound.source.loop = true;
        
        // Gain Node (Lautstärke) erstellen
        sound.gainNode = audioCtx.createGain();
        
        // Verbinden: Source -> Gain -> Lautsprecher
        sound.source.connect(sound.gainNode);
        sound.gainNode.connect(audioCtx.destination);
        
        // Starten
        sound.source.start(0);
    });
}

// Hier passiert die Sound-Logik basierend auf deinem Wunsch
gasSlider.addEventListener('input', (e) => {
    const value = parseFloat(e.target.value);
    sliderValue.innerText = `Drehzahl: ${Math.round(value * 100)}%`;
    updateSounds(value);
});

function updateSounds(x) {
    if (!audioCtx) return;
    
    // Aktuelle Zeit für weiche Übergänge
    const now = audioCtx.currentTime;
    const fadeTime = 0.05; // Kurzer Fade, damit es nicht knackt

    // 1. ENGINE.WAV (Wird schneller und lauter)
    // Standgas: Speed 1.0, Vol 0.5 -> Vollgas: Speed 2.5, Vol 1.0
    sounds.engine.source.playbackRate.linearRampToValueAtTime(1.0 + (x * 1.5), now + fadeTime);
    sounds.engine.gainNode.gain.linearRampToValueAtTime(0.5 + (x * 0.5), now + fadeTime);

    // 2. GAS.WAV (Feuert direkt heftig rein, flacht dann bei Höchstdrehzahl leicht ab für den "Schub"-Effekt)
    // Nutzt eine Kurve: Bei x=0 aus, bei x=0.4 sehr laut, bei x=1.0 wieder etwas konstanter
    let gasVolume = 0;
    if (x > 0) {
        gasVolume = x < 0.4 ? (x / 0.4) * 1.0 : 1.0 - ((x - 0.4) * 0.3); 
    }
    sounds.gas.gainNode.gain.linearRampToValueAtTime(gasVolume, now + fadeTime);
    sounds.gas.source.playbackRate.linearRampToValueAtTime(0.8 + (x * 0.7), now + fadeTime);

    // 3. METALL.AIFF (Klappern dreht durch: wird bei viel Gas extrem schnell und laut)
    // Standgas: fast unhörbar leise und langsam -> Vollgas: extrem laut und doppelte Geschwindigkeit
    sounds.metall.gainNode.gain.linearRampToValueAtTime(0.05 + (x * 0.95), now + fadeTime);
    sounds.metall.source.playbackRate.linearRampToValueAtTime(0.5 + (x * 2.0), now + fadeTime);

    // 4. STATIC.WAV (Konstantes Hintergrundgeräusch, wird nur minimal lauter)
    sounds.static.gainNode.gain.linearRampToValueAtTime(0.4 + (x * 0.2), now + fadeTime);

    // 5. NOISE.WAV (Begleiter für alles, schwillt linear mit an)
    sounds.noise.gainNode.gain.linearRampToValueAtTime(0.2 + (x * 0.6), now + fadeTime);
}
</script>

</body>
</html>
