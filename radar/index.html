<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panzer Motor Sound Simulator</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2b2b2a;
            color: #d4d4d2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #3a3a38;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border: 2px solid #555552;
            text-align: center;
            width: 350px;
        }
        button {
            background-color: #5c674e;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
        }
        button:hover { background-color: #717e60; }
        button:disabled { background-color: #444; color: #777; cursor: not-allowed; }
        .slider-container { margin-top: 20px; }
        input[type=range] {
            width: 100%;
            margin: 15px 0;
            accent-color: #8da075;
        }
        .status { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panzer Motor</h2>
    <button id="startBtn">1. MOTOR STARTEN</button>
    
    <div class="slider-container">
        <label for="gasSlider"><strong>DREHZAHL / GAS</strong></label>
        <input type="range" id="gasSlider" min="0" max="1" step="0.01" value="0" disabled>
        <div id="sliderValue">Standgas (0%)</div>
    </div>
    
    <div class="status" id="statusText">Warte auf Start...</div>
</div>

<script>
let audioCtx;
let sounds = {
    engine: { url: 'engine.wav', element: null, source: null, gainNode: null },
    gas: { url: 'gas.wav', element: null, source: null, gainNode: null },
    metall: { url: 'metall.wav', element: null, source: null, gainNode: null },
    static: { url: 'static.wav', element: null, source: null, gainNode: null },
    noise: { url: 'noise.wav', element: null, source: null, gainNode: null }
};

const startBtn = document.getElementById('startBtn');
const gasSlider = document.getElementById('gasSlider');
const statusText = document.getElementById('statusText');
const sliderValue = document.getElementById('sliderValue');

startBtn.addEventListener('click', async () => {
    if (!audioCtx) {
        // 1. Audio Kontext starten
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        statusText.innerText = "Initialisiere Motor...";
        startBtn.disabled = true;
        
        try {
            // 2. Sounds über Audio-Elemente laden (toleriert fast alle WAV-Formate)
            Object.keys(sounds).forEach(key => {
                const sound = sounds[key];
                
                sound.element = new Audio(sound.url);
                sound.element.loop = true;
                sound.element.crossOrigin = "anonymous"; // Verhindert CORS Probleme
                
                // Erstelle die Knotenkette
                sound.source = audioCtx.createMediaElementSource(sound.element);
                sound.gainNode = audioCtx.createGain();
                
                sound.source.connect(sound.gainNode);
                sound.gainNode.connect(audioCtx.destination);
            });

            // 3. Alle Sounds gleichzeitig abspielen
            const playPromises = Object.keys(sounds).map(key => sounds[key].element.play());
            await Promise.all(playPromises);
            
            statusText.innerText = "Motor läuft.";
            gasSlider.disabled = false;
            updateSounds(0); // Standgas einstellen
            
        } catch (error) {
            statusText.innerText = "Fehler: " + error.message;
            console.error(error);
            startBtn.disabled = false;
        }
    }
});

gasSlider.addEventListener('input', (e) => {
    const value = parseFloat(e.target.value);
    sliderValue.innerText = `Drehzahl: ${Math.round(value * 100)}%`;
    updateSounds(value);
});

function updateSounds(x) {
    if (!audioCtx) return;
    
    const now = audioCtx.currentTime;
    const fadeTime = 0.05;

    // 1. ENGINE
    sounds.engine.element.playbackRate = 1.0 + (x * 1.5);
    sounds.engine.gainNode.gain.linearRampToValueAtTime(0.5 + (x * 0.5), now + fadeTime);

    // 2. GAS
    let gasVolume = 0;
    if (x > 0) {
        gasVolume = x < 0.4 ? (x / 0.4) * 1.0 : 1.0 - ((x - 0.4) * 0.3); 
    }
    sounds.gas.element.playbackRate = 0.8 + (x * 0.7);
    sounds.gas.gainNode.gain.linearRampToValueAtTime(gasVolume, now + fadeTime);

    // 3. METALL
    sounds.metall.element.playbackRate = 0.5 + (x * 2.0);
    sounds.metall.gainNode.gain.linearRampToValueAtTime(0.05 + (x * 0.95), now + fadeTime);

    // 4. STATIC
    sounds.static.gainNode.gain.linearRampToValueAtTime(0.4 + (x * 0.2), now + fadeTime);

    // 5. NOISE
    sounds.noise.gainNode.gain.linearRampToValueAtTime(0.2 + (x * 0.6), now + fadeTime);
}
</script>

</body>
</html>
