<!DOCTYPE html>  <html lang="de">  
<head>  
<meta charset="UTF-8">  
<title>Vinyl Record</title>  
<style>  
body { font-family: Arial,sans-serif; text-align:center; margin:20px; background:#1e1e1e; color:white; }  
canvas { border:1px solid #444; display:block; margin:20px auto; background:#000; }  
button { width:120px; height:40px; border:none; border-radius:6px; background:#444; cursor:pointer; color:white; margin-bottom:10px; }  
button:hover { background:#666; }  
.knob-container { display:inline-flex; flex-direction:column; align-items:center; margin:0 15px; user-select:none; color:white; }  
.knob { width:60px; height:60px; border-radius:50%; background:#444; cursor:grab; display:flex; align-items:center; justify-content:center; font-weight:bold; }  
.knob-label { margin-top:5px; font-size:0.9em; }  
#controlsWrapper { display:flex; justify-content:center; margin-bottom:20px; }  
input[type=file]{display:none;}  
</style>  
</head>  
<body>  <button id="loadSampleBtn">Sample laden</button>

<div id="controlsWrapper">  
  <div class="knob-container"><div class="knob" id="volumeKnob">50%</div><div class="knob-label">Master Vol</div></div>  
  <div class="knob-container"><div class="knob" id="reverbKnobInner">30%</div><div class="knob-label">Reverb</div></div>  
  <div class="knob-container"><div class="knob" id="delayKnobInner">25%</div><div class="knob-label">Delay</div></div>  
</div>  <input type="file" id="file0" accept="audio/*" multiple>  <canvas id="waveform" width="800" height="300"></canvas>

<script>  
// --- Audio Setup ---  
const canvas = document.getElementById('waveform');  
const ctx = canvas.getContext('2d');  
  
const audioContext = new (window.AudioContext||window.webkitAudioContext)();  
const analyser = audioContext.createAnalyser();  
analyser.fftSize = 2048;  
  
// Master Gain  
const masterGain = audioContext.createGain();  
masterGain.connect(analyser);  
analyser.connect(audioContext.destination);  
  
// Reverb & Delay  
const convolver = audioContext.createConvolver();  
convolver.buffer = createReverbBuffer(audioContext,2);  
const delayNode = audioContext.createDelay(5.0);  
delayNode.delayTime.value = 0.25;  
const feedbackGain = audioContext.createGain();  
feedbackGain.gain.value = 0.3;  
const wetGain = audioContext.createGain();  
wetGain.gain.value = 0.3;  
  
delayNode.connect(feedbackGain);  
feedbackGain.connect(delayNode);  
delayNode.connect(wetGain);  
convolver.connect(wetGain);  
wetGain.connect(audioContext.destination);  
  
masterGain.connect(convolver);  
masterGain.connect(delayNode);  
  
// --- Variables ---  
const dataArray = new Uint8Array(analyser.fftSize);  
let audioBuffers = []; // mehrere Samples  
let activeSources = {}; // aktive BufferSources pro Note  
  
const startNote = 48; // C3  
const endNote = 72;   // C5  
let noteMap = [];      // Mapping Note -> Sample  
  
const centerY = canvas.height/2;  
let markerY = centerY;  
let upPressed = false;  
let downPressed = false;  
  
// --- Load File Button ---  
const fileInput = document.getElementById('file0');  
const loadBtn = document.getElementById('loadSampleBtn');  
loadBtn.addEventListener('click', () => fileInput.click());  
  
fileInput.addEventListener('change', async function(){  
  if(!this.files.length) return;  
  audioBuffers = [];  
  for(const file of this.files){  
    const buffer = await file.arrayBuffer();  
    audioBuffers.push(await audioContext.decodeAudioData(buffer));  
  }  
  // Mapping auf Range 48–72  
  noteMap = [];  
  const totalNotes = endNote - startNote + 1;  
  for(let i=0;i<totalNotes;i++){  
    const sampleIndex = Math.floor(i * audioBuffers.length / totalNotes);  
    noteMap[startNote+i] = sampleIndex;  
  }  
});  
  
// --- WebMIDI ---  
if(navigator.requestMIDIAccess){  
  navigator.requestMIDIAccess().then(onMIDISuccess,onMIDIFail);  
} else console.warn("WebMIDI nicht unterstützt");  
  
function onMIDISuccess(midiAccess){  
  for(let input of midiAccess.inputs.values()) input.onmidimessage = handleMIDI;  
}  
function onMIDIFail(){ console.warn("MIDI Zugriff fehlgeschlagen"); }  
  
function handleMIDI(msg){  
  const [status,data1,data2] = msg.data;  
  const cmd = status>>4;  
  
  if(cmd===9 && data2>0){ // Note On  
    const idx = noteMap[data1];  
    if(idx!==undefined) playSample(data1, idx);  
  } else if(cmd===8 || (cmd===9 && data2===0)){ // Note Off  
    if(activeSources[data1]) stopSample(data1);  
  } else if(cmd===14){ // Pitch Bend  
    const bend = ((data2<<7)|data1)-8192;   
    upPressed = bend > 200;  
    downPressed = bend < -200;  
  }  
}  
  
// --- Play / Stop ---  
function playSample(note, index){  
  if(!audioBuffers[index]) return;  
  const src = audioContext.createBufferSource();  
  src.buffer = audioBuffers[index];  
  src.connect(masterGain);  
  src.start();  
  if(!activeSources[note]) activeSources[note] = [];  
  activeSources[note].push(src);  
  src.onended = ()=>{   
    const arr = activeSources[note];  
    if(arr) {  
      const i = arr.indexOf(src);  
      if(i!==-1) arr.splice(i,1);  
      if(arr.length===0) delete activeSources[note];  
    }  
  };  
}  
  
function stopSample(note){  
  if(!activeSources[note]) return;  
  activeSources[note].forEach(src=>{ try{ src.stop(); }catch{} });  
  delete activeSources[note];  
}  
  
// --- Draw Waveform ---  
function draw(){  
  requestAnimationFrame(draw);  
  ctx.clearRect(0,0,canvas.width,canvas.height);  
  
  const speed = 25;  
  if(upPressed) markerY -= speed*(markerY/canvas.height);  
  if(downPressed) markerY += speed*((canvas.height-markerY)/canvas.height);  
  if(!upPressed && !downPressed) markerY += (centerY - markerY)*0.25;  
  
  if(markerY<0) markerY=0;  
  if(markerY>canvas.height) markerY=canvas.height;  
  
  const normalized = (centerY - markerY)/(canvas.height/2);  
  const pitch = Math.pow(2, normalized*24/12);  
  Object.values(activeSources).flat().forEach(src=>{ src.playbackRate.value = pitch; });  
  
  analyser.getByteTimeDomainData(dataArray);  
  ctx.fillStyle='#000'; ctx.fillRect(50,0,canvas.width-50,canvas.height);  
  ctx.beginPath(); ctx.lineWidth=2; ctx.strokeStyle='#00ff00';  
  let sliceWidth=(canvas.width-50)/dataArray.length; let x=50;  
  for(let i=0;i<dataArray.length;i++){  
    let v=dataArray[i]/128; let y=v*canvas.height/2;  
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);  
    x+=sliceWidth;  
  }  
  ctx.stroke();  
  
  ctx.fillStyle='#222'; ctx.fillRect(0,0,50,canvas.height);  
  ctx.fillStyle='#ff0000'; ctx.fillRect(0,markerY-5,50,10);  
  ctx.strokeStyle='#888'; ctx.beginPath(); ctx.moveTo(0,centerY); ctx.lineTo(50,centerY); ctx.stroke();  
}  
draw();  
  
// --- Knobs ---  
function createKnob(knobElement, initialValue, callback){  
  let isDragging=false; let value=initialValue;  
  knobElement.textContent = Math.round(value*100)+'%';  
  knobElement.addEventListener('mousedown', e=>{ isDragging=true; e.preventDefault(); });  
  window.addEventListener('mousemove', e=>{  
    if(!isDragging) return;  
    value=Math.min(Math.max(value-e.movementY/100,0),1);  
    knobElement.textContent=Math.round(value*100)+'%';  
    callback(value);  
  });  
  window.addEventListener('mouseup', ()=>{ if(isDragging) isDragging=false; });  
  callback(value);  
}  
createKnob(document.getElementById('volumeKnob'),0.5,v=>{ masterGain.gain.value=v; });  
createKnob(document.getElementById('reverbKnobInner'),0.3,v=>{ wetGain.gain.value=v; });  
createKnob(document.getElementById('delayKnobInner'),0.25,v=>{ delayNode.delayTime.value=v; });  
  
// --- Reverb Buffer ---  
function createReverbBuffer(ctx,duration=2){  
  const sr=ctx.sampleRate, len=sr*duration;  
  const buf=ctx.createBuffer(2,len,sr);  
  for(let ch=0;ch<2;ch++){  
    const data=buf.getChannelData(ch);  
    for(let i=0;i<len;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);  
  }  
  return buf;  
}  
</script>  </body>  
</html>
