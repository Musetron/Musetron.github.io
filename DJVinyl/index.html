<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Record</title>

<style>
body {
  font-family: Arial,sans-serif;
  text-align:center;
  margin:0;
  background:#1e1e1e;
  color:white;
}

canvas {
  border:1px solid #444;
  display:block;
  margin:10px auto;
  background:#000;
}

button {
  width:140px;
  height:45px;
  border:none;
  border-radius:8px;
  background:#444;
  color:white;
  margin:10px;
  font-size:16px;
  touch-action:none;
}

button:hover { background:#666; }

.knob-container {
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  margin:10px;
  user-select:none;
}

.knob {
  width:70px;
  height:70px;
  border-radius:50%;
  background:#444;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  touch-action:none;
}

.knob-label {
  margin-top:5px;
  font-size:0.9em;
}

#controlsWrapper {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

input[type=file]{display:none;}
</style>
</head>

<body>

<button id="loadSampleBtn">Sample laden</button>

<div id="controlsWrapper">
  <div class="knob-container">
    <div class="knob" id="volumeKnob">50%</div>
    <div class="knob-label">Master Vol</div>
  </div>

  <div class="knob-container">
    <div class="knob" id="reverbKnobInner">30%</div>
    <div class="knob-label">Reverb</div>
  </div>

  <div class="knob-container">
    <div class="knob" id="delayKnobInner">25%</div>
    <div class="knob-label">Delay</div>
  </div>
</div>

<input type="file" id="file0" accept="audio/*" multiple>
<canvas id="waveform"></canvas>

<script>
// ================= AUDIO SETUP =================
const canvas = document.getElementById('waveform');
const ctx = canvas.getContext('2d');

const audioContext = new (window.AudioContext||window.webkitAudioContext)();

// 🔥 ANDROID FIX: Audio freischalten
async function unlockAudio(){
  if(audioContext.state !== 'running'){
    await audioContext.resume();
  }
}
document.body.addEventListener('touchstart', unlockAudio, {once:true});
document.body.addEventListener('click', unlockAudio, {once:true});

const analyser = audioContext.createAnalyser();
analyser.fftSize = 2048;

// Master
const masterGain = audioContext.createGain();
masterGain.connect(analyser);
analyser.connect(audioContext.destination);

// FX
const convolver = audioContext.createConvolver();
convolver.buffer = createReverbBuffer(audioContext,2);

const delayNode = audioContext.createDelay(5.0);
const feedbackGain = audioContext.createGain();
const wetGain = audioContext.createGain();

feedbackGain.gain.value = 0.3;
delayNode.delayTime.value = 0.25;

delayNode.connect(feedbackGain);
feedbackGain.connect(delayNode);
delayNode.connect(wetGain);
convolver.connect(wetGain);
wetGain.connect(audioContext.destination);

masterGain.connect(convolver);
masterGain.connect(delayNode);

// ================= VARIABLES =================
const dataArray = new Uint8Array(analyser.fftSize);
let audioBuffers = [];
let activeSources = {};

const startNote = 48;
const endNote = 72;
let noteMap = [];

const centerY = 150;
let markerY = centerY;

let upPressed = false;
let downPressed = false;

// ================= FILE LOAD =================
const fileInput = document.getElementById('file0');
document.getElementById('loadSampleBtn').onclick = ()=> fileInput.click();

fileInput.addEventListener('change', async function(){
  if(!this.files.length) return;

  audioBuffers = [];

  for(const file of this.files){
    const buffer = await file.arrayBuffer();
    audioBuffers.push(await audioContext.decodeAudioData(buffer));
  }

  noteMap = [];
  const totalNotes = endNote - startNote + 1;

  for(let i=0;i<totalNotes;i++){
    const idx = Math.floor(i * audioBuffers.length / totalNotes);
    noteMap[startNote+i] = idx;
  }
});

// ================= PLAY =================
function playSample(note, index){
  if(!audioBuffers[index]) return;

  const src = audioContext.createBufferSource();
  src.buffer = audioBuffers[index];
  src.connect(masterGain);
  src.start();

  if(!activeSources[note]) activeSources[note] = [];
  activeSources[note].push(src);
}

function stopSample(note){
  if(!activeSources[note]) return;
  activeSources[note].forEach(s=>{ try{s.stop()}catch{} });
  delete activeSources[note];
}

// ================= DRAW =================
function resizeCanvas(){
  canvas.width = window.innerWidth * 0.95;
  canvas.height = 250;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function draw(){
  requestAnimationFrame(draw);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const centerY = canvas.height/2;

  if(upPressed) markerY -= 5;
  if(downPressed) markerY += 5;
  markerY += (centerY - markerY)*0.1;

  const normalized = (centerY - markerY)/(canvas.height/2);
  const pitch = Math.pow(2, normalized*2);

  Object.values(activeSources).flat().forEach(src=>{
    src.playbackRate.value = pitch;
  });

  analyser.getByteTimeDomainData(dataArray);

  ctx.beginPath();
  let sliceWidth = canvas.width / dataArray.length;
  let x = 0;

  for(let i=0;i<dataArray.length;i++){
    let v = dataArray[i]/128;
    let y = v*canvas.height/2;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);

    x+=sliceWidth;
  }

  ctx.strokeStyle='#00ff00';
  ctx.stroke();

  ctx.fillStyle='#ff0000';
  ctx.fillRect(0,markerY-5,50,10);
}
draw();

// ================= TOUCH KNOBS =================
function createKnob(el, val, cb){
  let dragging=false;
  let lastY=0;

  el.textContent = Math.round(val*100)+'%';

  function update(y){
    let delta = (lastY - y)/100;
    val = Math.min(Math.max(val+delta,0),1);
    el.textContent = Math.round(val*100)+'%';
    cb(val);
    lastY = y;
  }

  el.addEventListener('touchstart', e=>{
    dragging=true;
    lastY = e.touches[0].clientY;
  });

  window.addEventListener('touchmove', e=>{
    if(!dragging) return;
    update(e.touches[0].clientY);
  });

  window.addEventListener('touchend', ()=> dragging=false);

  el.addEventListener('mousedown', e=>{
    dragging=true;
    lastY = e.clientY;
  });

  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    update(e.clientY);
  });

  window.addEventListener('mouseup', ()=> dragging=false);

  cb(val);
}

// Knobs
createKnob(document.getElementById('volumeKnob'),0.5,v=>{
  masterGain.gain.value = v;
});

createKnob(document.getElementById('reverbKnobInner'),0.3,v=>{
  wetGain.gain.value = v;
});

createKnob(document.getElementById('delayKnobInner'),0.25,v=>{
  delayNode.delayTime.value = v;
});

// ================= REVERB =================
function createReverbBuffer(ctx,duration){
  const rate = ctx.sampleRate;
  const length = rate*duration;
  const buffer = ctx.createBuffer(2,length,rate);

  for(let ch=0;ch<2;ch++){
    const data = buffer.getChannelData(ch);
    for(let i=0;i<length;i++){
      data[i]=(Math.random()*2-1)*(1-i/length);
    }
  }
  return buffer;
}

// ================= MIDI WARNING =================
if(!navigator.requestMIDIAccess){
  console.warn("Kein WebMIDI auf diesem Gerät");
}
</script>

</body>
</html>
