<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild → Audio Spektrogramm Encoder</title>
<style>
  body { background:#111; color:white; font-family:sans-serif; text-align:center; }
  canvas { margin:10px; }
</style>
</head>
<body>

<h2>🖼️ Bild → Audio Spektrogramm Encoder</h2>

<input type="file" id="file" accept="image/*"><br>

<canvas id="imgCanvas"></canvas>

<button onclick="encode()">▶ Encode & Play Audio</button>

<script>
const imgCanvas = document.getElementById("imgCanvas");
const ctx = imgCanvas.getContext("2d");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let imgDataGlobal;

document.getElementById("file").onchange = function(e) {
  const file = e.target.files[0];
  const img = new Image();

  img.onload = function() {
    imgCanvas.width = 128;
    imgCanvas.height = 128;
    ctx.drawImage(img, 0, 0, 128, 128);

    imgDataGlobal = ctx.getImageData(0, 0, 128, 128);
  };

  img.src = URL.createObjectURL(file);
};

function encode() {
  if (!imgDataGlobal) return;

  const width = 128;
  const height = 128;

  const sampleRate = audioCtx.sampleRate;
  const duration = 4;

  const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
  const channel = buffer.getChannelData(0);

  // Initial silence
  for (let i = 0; i < channel.length; i++) channel[i] = 0;

  // Zeit pro Bildzeile
  const samplesPerRow = Math.floor(channel.length / height);

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {

      const idx = (y * width + x) * 4;

      const r = imgDataGlobal.data[idx] / 255;
      const g = imgDataGlobal.data[idx + 1] / 255;
      const b = imgDataGlobal.data[idx + 2] / 255;

      // grayscale brightness
      const brightness = (r + g + b) / 3;

      const freqPhase = x / width;
      const timeStart = y * samplesPerRow;

      for (let i = 0; i < samplesPerRow; i++) {
        const t = timeStart + i;

        const freq = 200 + freqPhase * 2000;

        const sample =
          Math.sin(2 * Math.PI * freq * t / sampleRate) * brightness;

        channel[t] += sample * 0.002;
      }
    }
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start();
}
</script>

</body>
</html>
