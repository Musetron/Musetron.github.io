<!doctype html>
<html>
<body style="background:#000;color:#0f0;font-family:monospace;text-align:center;">
<button id="start">START RX</button>
<canvas id="out" width="128" height="128" style="border:1px solid #0f0"></canvas>

<script>
let audioCtx, analyser, data, src;
const canvas = document.getElementById("out");
const ctx = canvas.getContext("2d");

let img = ctx.createImageData(128,128);

async function start(){
  audioCtx = new AudioContext();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  data = new Uint8Array(analyser.frequencyBinCount);

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);

  let i = 0;

  function loop(){
    requestAnimationFrame(loop);

    analyser.getByteFrequencyData(data);

    // finde Peak frequency bin
    let max = 0, idx = 0;
    for(let j=0;j<data.length;j++){
      if(data[j] > max){
        max = data[j];
        idx = j;
      }
    }

    // freq → grayscale
    let gray = 255 - (idx / data.length) * 255;

    let x = i % 128;
    let y = Math.floor(i / 128);

    let p = (y*128 + x)*4;

    img.data[p] = gray;
    img.data[p+1] = gray;
    img.data[p+2] = gray;
    img.data[p+3] = 255;

    ctx.putImageData(img,0,0);

    i++;
    if(i > 128*128) i = 0;
  }

  loop();
}

document.getElementById("start").onclick = start;
</script>
</body>
</html>
