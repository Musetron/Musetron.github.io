<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FM Image Synth</title>
<style>
  body { background:#0a0a0a; color:#0f0; font-family:monospace; }
  video { width: 240px; display:block; }
  canvas { display:none; }
</style>
</head>
<body>

<h3>Bild → FM Synth (128×128)</h3>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="128" height="128"></canvas>

<script>
const WIDTH = 128;
const HEIGHT = 128;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let audioCtx;
let carrier;
let modulator;
let modGain;
let masterGain;

let pixels = [];
let index = 0;

// ---------------- CAMERA ----------------
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// ---------------- IMAGE CAPTURE ----------------
function captureFrame() {
  ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
  const img = ctx.getImageData(0, 0, WIDTH, HEIGHT).data;

  pixels = [];

  for (let i = 0; i < img.length; i += 4) {
    const r = img[i];
    const g = img[i+1];
    const b = img[i+2];

    const gray = (0.299*r + 0.587*g + 0.114*b) / 255;
    pixels.push(gray);
  }

  index = 0;
}

// ---------------- AUDIO SETUP (FM) ----------------
function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Carrier (hörbarer Ton)
  carrier = audioCtx.createOscillator();
  carrier.type = "sine";

  // Modulator (FM)
  modulator = audioCtx.createOscillator();
  modulator.type = "sine";

  modGain = audioCtx.createGain();
  masterGain = audioCtx.createGain();

  masterGain.gain.value = 0.4;

  // Routing:
  modulator.connect(modGain);
  modGain.connect(carrier.frequency);

  carrier.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  carrier.start();
  modulator.start();

  animateSound();
}

// ---------------- IMAGE → FM MAPPING ----------------
function animateSound() {
  const pixelRate = 120 / 60; // 120 px per minute → 2 px/sec

  setInterval(() => {

    if (!pixels.length) return;

    const p = pixels[index % pixels.length];

    // BASISFREQUENZ (hell = hoch, dunkel = tief)
    const baseFreq = 80 + (p * 900); // 80–980 Hz

    // MODULATIONSTIEFE (dunkel = stärker)
    const modDepth = (1 - p) * 600;

    carrier.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
    modGain.gain.setValueAtTime(modDepth, audioCtx.currentTime);

    // Modulator langsam bewegen → Bildstruktur hörbar machen
    modulator.frequency.setValueAtTime(2 + (p * 20), audioCtx.currentTime);

    index++;

  }, 500); // 120 Pixel/min
}

// ---------------- LOOP ----------------
function startLoop() {
  captureFrame();
  setInterval(captureFrame, 60000);
}

// ---------------- INIT ----------------
async function init() {
  await startCamera();
  startAudio();
  startLoop();
}

init();
</script>

</body>
</html>
