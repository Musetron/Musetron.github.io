<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Audio Wasserfall Decoder</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: sans-serif;
    text-align: center;
  }

  canvas {
    display: block;
    margin: 0 auto;
    background: black;
  }

  #status {
    padding: 10px;
  }
</style>
</head>
<body>

<h2>🎧 Audio → Wasserfall Decoder</h2>
<div id="status">Starte Mikrofon...</div>

<canvas id="canvas" width="800" height="512"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let audioCtx;
let analyser;
let dataArray;

async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;

  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  status.textContent = "Mikrofon aktiv – Wasserfall läuft";

  draw();
}

function draw() {
  requestAnimationFrame(draw);

  analyser.getByteFrequencyData(dataArray);

  // Bild nach unten schieben (Wasserfall-Effekt)
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  ctx.putImageData(imageData, 0, 1);

  // neue Zeile oben zeichnen
  for (let x = 0; x < canvas.width; x++) {
    const index = Math.floor(x / canvas.width * dataArray.length);
    const value = dataArray[index];

    const intensity = value;

    ctx.fillStyle = `rgb(${intensity}, ${intensity}, ${intensity})`;
    ctx.fillRect(x, 0, 1, 1);
  }
}

start();
</script>

</body>
</html>
