<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Noise Raster Decoder</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #00ff88;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 10px;
  }

  canvas {
    width: 512px;
    height: 512px;
    border: 1px solid #00ff88;
    image-rendering: pixelated;
  }

  button {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid #00ff88;
    color: #00ff88;
    cursor: pointer;
  }

  .status { opacity: 0.8; }
</style>
</head>

<body>

<canvas id="screen" width="128" height="128"></canvas>
<button id="start">START DECODE</button>
<div class="status" id="status">idle</div>

<script>
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");

const status = document.getElementById("status");

let audioCtx;
let analyser;
let dataArray;

const WIDTH = 128;
const HEIGHT = 128;

let startTime;
const duration = 6.0;

// Frame buffer
const img = ctx.createImageData(WIDTH, HEIGHT);

// AUDIO SETUP
async function setupAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.0;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioCtx.createMediaStreamSource(stream);

  source.connect(analyser);
}

// MAP AUDIO → AMPLITUDE (einfacher RMS Ansatz)
function getAmplitude() {
  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let v = (dataArray[i] - 128) / 128;
    sum += v * v;
  }

  return Math.sqrt(sum / dataArray.length);
}

// DRAW LOOP
function draw() {
  requestAnimationFrame(draw);

  const now = (performance.now() - startTime) / 1000;

  if (now > duration) {
    status.textContent = "frame complete";
    return;
  }

  const progress = now / duration;

  const totalPixels = WIDTH * HEIGHT;
  const pixelIndex = Math.floor(progress * totalPixels);

  const x = pixelIndex % WIDTH;
  const y = Math.floor(pixelIndex / WIDTH);

  const amp = getAmplitude();

  // invert (wie im Sender: dunkel = stark)
  const intensity = Math.max(0, Math.min(255, (1 - amp) * 255));

  const i = (y * WIDTH + x) * 4;

  // schreiben
  img.data[i] = intensity;
  img.data[i+1] = intensity;
  img.data[i+2] = intensity;
  img.data[i+3] = 255;

  ctx.putImageData(img, 0, 0);
}

// START
document.getElementById("start").onclick = async () => {
  status.textContent = "starting...";

  await setupAudio();

  startTime = performance.now();

  status.textContent = "decoding stream...";

  draw();
};
</script>

</body>
</html>
