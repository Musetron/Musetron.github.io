<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Camera Audio Encoder</title>
<style>
  body { background:#111; color:#0f0; font-family:monospace; }
  canvas { display:none; }
  video { width: 320px; }
</style>
</head>
<body>

<h3>Camera → Audio Encoder (128x128 / 120 px/min)</h3>
<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="128" height="128"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let audioCtx;
let noiseNode;
let gainNode;

const WIDTH = 128;
const HEIGHT = 128;

// 120 Pixel pro Minute = 500ms pro Pixel
const PIXEL_INTERVAL_MS = 500;

let pixels = [];
let index = 0;

// Kamera starten
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

function captureFrame() {
  ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);
  const img = ctx.getImageData(0, 0, WIDTH, HEIGHT).data;

  pixels = [];

  for (let i = 0; i < img.length; i += 4) {
    const r = img[i];
    const g = img[i + 1];
    const b = img[i + 2];

    // grayscale
    const gray = (0.299*r + 0.587*g + 0.114*b) / 255;

    pixels.push(gray);
  }

  index = 0;
}

// Audio Setup
function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.5;

  const bufferSize = 4096;

  noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);

  noiseNode.onaudioprocess = function(e) {
    const output = e.outputBuffer.getChannelData(0);

    for (let i = 0; i < output.length; i++) {
      let val = 0;

      if (pixels.length > 0) {
        const p = pixels[index % pixels.length];

        // inverse mapping:
        // hell -> leise, dunkel -> laut
        const amplitude = (1 - p);

        // noise
        val = (Math.random() * 2 - 1) * amplitude;

        index++;
      }

      output[i] = val;
    }
  };

  noiseNode.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

// Loop: jede Minute neues Bild
function startCaptureLoop() {
  captureFrame();
  setInterval(captureFrame, 60000);
}

// optional: "scan" speed visual timing (informativ)
function logScanSpeed() {
  console.log("Scanrate: 120 Pixel / Minute (~1 Pixel / 500ms)");
}

// INIT
async function init() {
  await startCamera();
  startAudio();
  startCaptureLoop();
  logScanSpeed();
}

init();
</script>

</body>
</html>
