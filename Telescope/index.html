<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetometer Laser Oscilloscope</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      height: 100vh;
    }canvas {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background: radial-gradient(circle at center, rgba(0,20,10,0.9) 0%, rgba(0,0,0,1) 100%);
}

.ui {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

.panel {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(0,255,136,0.25);
  border-radius: 999px;
  padding: 10px 18px;
  backdrop-filter: blur(10px);
}

input[type="range"] {
  width: 260px;
  accent-color: #00ff88;
}

  </style>
</head>
<body>  <div class="ui">
    <div class="panel">
      <input type="range" id="gain" min="0.1" max="10" step="0.1" value="2" />
    </div>
  </div><canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const gainSlider = document.getElementById('gain');
    let gain = parseFloat(gainSlider.value);

    gainSlider.addEventListener('input', () => {
      gain = parseFloat(gainSlider.value);
    });

    let points = [];
    const maxPoints = 600;

    let baseX = null;
    let baseY = null;

    function addPoint(x, y) {
      points.push({ x, y });
      if (points.length > maxPoints) points.shift();
    }

    function draw() {
      requestAnimationFrame(draw);

      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      ctx.beginPath();

      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        const x = cx + p.x * gain;
        const y = cy + p.y * gain;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.strokeStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 28;
      ctx.lineWidth = 1.4;
      ctx.stroke();
    }

    draw();

    async function startMagnetometer() {
      try {
        if (!('Magnetometer' in window)) {
          alert('Magnetometer API nicht unterstützt');
          return;
        }

        // Optional permission (mainly Chrome/Android)
        if (navigator.permissions) {
          try {
            const status = await navigator.permissions.query({ name: 'magnetometer' });
            console.log('Magnetometer permission:', status.state);
          } catch (e) {}
        }

        const sensor = new Magnetometer({ frequency: 60 });

        sensor.addEventListener('reading', () => {
          let x = sensor.x || 0;
          let y = sensor.y || 0;

          // calibration baseline
          if (baseX === null) {
            baseX = x;
            baseY = y;
          }

          x = x - baseX;
          y = y - baseY;

          // soften signal
          x *= 0.6;
          y *= 0.6;

          addPoint(x, y);
        });

        sensor.addEventListener('error', (event) => {
          console.error(event.error);
        });

        sensor.start();
      } catch (e) {
        console.error(e);
        alert('Sensor Zugriff fehlgeschlagen (HTTPS + Gerät nötig)');
      }
    }

    startMagnetometer();
  </script></body>
</html>
