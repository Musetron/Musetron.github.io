<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stereo 2D Oscilloscope</title>
  <style>
    * {
      box-sizing: border-box;
    }body {
  margin: 0;
  background: #000;
  overflow: hidden;
  height: 100vh;
}

canvas {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background: radial-gradient(circle at center, rgba(0,20,10,0.95) 0%, rgba(0,0,0,1) 100%);
}

.ui {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

.panel {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(0,255,136,0.25);
  border-radius: 999px;
  padding: 10px 18px;
  backdrop-filter: blur(10px);
}

.minimal-panel input {
  width: 240px;
  accent-color: #00ff88;
}

.panel-old {
  background: rgba(0,0,0,0.7);
  border: 1px solid #00ff88;
  border-radius: 12px;
  padding: 12px;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 12px rgba(0,255,136,0.2);
}

button,
input[type="file"] {
  background: #001a10;
  color: #00ff88;
  border: 1px solid #00ff88;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #00331f;
}

.info {
  font-size: 13px;
  line-height: 1.5;
  opacity: 0.85;
  max-width: 320px;
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
  color: #66ffbb;
}

  </style>
</head>
<body>  <div class="ui">
    <div class="panel minimal-panel">
      <input type="range" id="gainSlider" min="0.2" max="8" value="2" step="0.1" />
    </div>
  </div><canvas id="scope"></canvas>

  <script>
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener('resize', resize);

    const gainSlider = document.getElementById('gainSlider');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const analyserL = audioCtx.createAnalyser();
    const analyserR = audioCtx.createAnalyser();

    analyserL.fftSize = 2048;
    analyserR.fftSize = 2048;

    const micGain = audioCtx.createGain();

    const splitter = audioCtx.createChannelSplitter(2);

    let leftData = new Uint8Array(analyserL.fftSize);
    let rightData = new Uint8Array(analyserR.fftSize);

    micGain.gain.value = 2;

    async function initMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 2,
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          }
        });

        const micSource = audioCtx.createMediaStreamSource(stream);

        micSource.connect(micGain);
        micGain.connect(splitter);

        splitter.connect(analyserL, 0);
        splitter.connect(analyserR, 1);

        await audioCtx.resume();
      } catch (err) {
        alert('Mikrofonzugriff fehlgeschlagen');
        console.error(err);
      }
    }

    gainSlider.addEventListener('input', () => {
      micGain.gain.value = parseFloat(gainSlider.value);
    });

    initMic();

    function drawGrid() {
      const w = canvas.width;
      const h = canvas.height;

      ctx.strokeStyle = 'rgba(0,255,136,0.04)';
      ctx.lineWidth = 1;

      const spacing = 50;

      for (let x = 0; x < w; x += spacing) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }

      for (let y = 0; y < h; y += spacing) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(0,255,136,0.12)';
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(w / 2, 0);
      ctx.lineTo(w / 2, h);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
    }

    function animate() {
      requestAnimationFrame(animate);

      analyserL.getByteTimeDomainData(leftData);
      analyserR.getByteTimeDomainData(rightData);

      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      const scaleX = canvas.width * 0.35;
      const scaleY = canvas.height * 0.35;

      ctx.beginPath();

      for (let i = 0; i < leftData.length; i++) {
        const left = (leftData[i] - 128) / 128;
        const right = (rightData[i] - 128) / 128;

        const x = centerX + left * scaleX;
        const y = centerY + right * scaleY;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 18;
      ctx.stroke();

      // Cleaner laser rendering without center dot
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 24;

      ctx.strokeStyle = 'rgba(0,255,136,0.95)';
      ctx.lineWidth = 1.8;
      ctx.stroke();

      ctx.shadowBlur = 40;
      ctx.strokeStyle = 'rgba(0,255,136,0.18)';
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.fillStyle = '#00ff88';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    animate();
  </script></body>
</html>
