<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spirit Viewer AUDIO FIX</title>
<style>
body { margin:0; background:black; }
canvas { display:block; }
button {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
  padding:10px;
}
</style>
</head>
<body>

<button id="start">START MIC</button>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let analyser = null;
let data = null;
let running = false;

let WIDTH = 64;
let HEIGHT = 64;

let buffer = [];
let spec = Array.from({length: 120}, () => new Array(WIDTH).fill(0));

// resize
function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ---------------- START MIC ----------------
document.getElementById("start").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

    const audioCtx = new AudioContext();
    const src = audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;

    src.connect(analyser);

    data = new Float32Array(analyser.fftSize);

    running = true;
    document.getElementById("start").remove();

    loop();

  } catch (e) {
    alert("Mikrofon blockiert oder nicht erlaubt");
    console.log(e);
  }
};

// ---------------- LOOP ----------------
function loop(){
  requestAnimationFrame(loop);

  ctx.fillStyle = "black";
  ctx.fillRect(0,0,c.width,c.height);

  if (!running || !analyser) return;

  analyser.getFloatTimeDomainData(data);

  // buffer
  for (let i=0;i<data.length;i++){
    buffer.push(data[i]);
  }

  if (buffer.length > WIDTH*HEIGHT){
    buffer.splice(0, buffer.length - WIDTH*HEIGHT);
  }

  // fake spectrum (stabil)
  let mag = new Array(WIDTH).fill(0);

  for (let i=0;i<WIDTH;i++){
    mag[i] = Math.abs(data[i] || 0);
  }

  let max = Math.max(...mag) + 0.0001;
  mag = mag.map(v => v/max);

  spec.push(mag);
  if (spec.length > 120) spec.shift();

  // ---------------- IMAGE ----------------
  if (buffer.length >= WIDTH*HEIGHT){

    let img = ctx.createImageData(WIDTH, HEIGHT);

    for (let i=0;i<WIDTH*HEIGHT;i++){
      let v = buffer[buffer.length - WIDTH*HEIGHT + i];

      v = Math.abs(v) * 4;

      let c = Math.min(255, v * 255);

      img.data[i*4+0] = c;
      img.data[i*4+1] = c;
      img.data[i*4+2] = c;
      img.data[i*4+3] = 255;
    }

    let off = document.createElement("canvas");
    off.width = WIDTH;
    off.height = HEIGHT;

    off.getContext("2d").putImageData(img,0,0);

    ctx.drawImage(off, 0, 0, c.width, c.height*0.6);
  }

  // ---------------- SPECTROGRAM ----------------
  let img2 = ctx.createImageData(WIDTH, 120);

  for (let y=0;y<120;y++){
    for (let x=0;x<WIDTH;x++){
      let v = spec[y][x] || 0;

      let i = (y*WIDTH + x)*4;
      img2.data[i] = v*255;
      img2.data[i+1] = v*255;
      img2.data[i+2] = v*255;
      img2.data[i+3] = 255;
    }
  }

  let off2 = document.createElement("canvas");
  off2.width = WIDTH;
  off2.height = 120;

  off2.getContext("2d").putImageData(img2,0,0);

  ctx.drawImage(off2, 0, c.height*0.6, c.width, c.height*0.4);
}
</script>

</body>
</html>
